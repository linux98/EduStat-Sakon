        editRow.style.display = 'table-row';
        const latInput = document.getElementById('gis-lat-' + key);
        if (latInput) latInput.focus();
      }
    }

    function cancelGisEdit(key) {
      const editRow = document.getElementById('gis-edit-row-' + key);
      if (editRow) editRow.style.display = 'none';
    }

    function saveGisCoord(key) {
      const latEl = document.getElementById('gis-lat-' + key);
      const lngEl = document.getElementById('gis-lng-' + key);
      if (!latEl || !lngEl) return;

      const lat = parseFloat(latEl.value);
      const lng = parseFloat(lngEl.value);

      if (isNaN(lat) || isNaN(lng)) {
        showToast('กรุณากรอกพิกัดให้ถูกต้อง (ต้องเป็นตัวเลขทศนิยม)', 'warning');
        return;
      }
      if (lat < 5 || lat > 21 || lng < 97 || lng > 106) {
        showToast('พิกัดอยู่นอกขอบเขตประเทศไทย กรุณาตรวจสอบ', 'warning');
        return;
      }

      // อัปเดต in-memory store
      GIS_COORDS_LOCAL[key] = { lat, lng };

      // บันทึกลง backend (ถ้ามี)
      const payload = { agencyId: key, lat, lng, userRole: AppState.userRole, sessionToken: AppState.sessionToken };
      if (typeof google !== 'undefined' && google.script) {
        google.script.run
          .withSuccessHandler(res => {
            showToast(res.success ? `บันทึกพิกัด ${AGENCY_MAP[key]} เรียบร้อยแล้ว` : res.message,
                      res.success ? 'success' : 'error');
          })
          .withFailureHandler(() => showToast('บันทึกพิกัดไม่สำเร็จ (server error)', 'error'))
          .saveAgencyGisCoord(payload);
      } else {
        showToast(`บันทึกพิกัด ${AGENCY_MAP[key]}: ${lat}, ${lng} เรียบร้อยแล้ว`, 'success');
      }

      // อัปเดต display row และซ่อน edit row
      const displayCell = document.getElementById('gis-coord-display-' + key);
      if (displayCell) {
        displayCell.innerHTML = `
          <div style="display:flex; flex-direction:column; gap:4px;">
            <div style="display:inline-flex; align-items:center; gap:5px; background:var(--green-ll); color:var(--green); border:1px solid var(--green-l); padding:3px 8px; border-radius:6px; font-size:11.5px; font-weight:600; width:fit-content;">
              <span class="material-icons-round" style="font-size:13px;">check_circle</span>
              <span>ปักหมุดแล้ว</span>
            </div>
            <div style="font-family:monospace; color:var(--muted); font-size:11.5px; padding-left:2px; letter-spacing:0.2px;">
              ${lat.toFixed(6)}, ${lng.toFixed(6)}
            </div>
          </div>`;
      }
      cancelGisEdit(key);

      // ถ้าแผนที่เปิดอยู่ ให้ refresh markers
      if (map && AppState.currentDashboardData) {
        updateMapMarkers(AppState.currentDashboardData.mapPoints || []);
      }
    }

    let _systemLogsCache = [];

    // --- Audit Log Helpers ---
    function _formatAuditTimestamp(ts) {
      if (!ts) return '';
      const parts = ts.split(' ');
      if (parts.length >= 2) {
        return `
          <div style="display:flex; flex-direction:column; gap:2px; text-align:left;">
            <div style="font-weight:600; color:var(--text); font-size:12px;">${parts[0]}</div>
            <div style="color:var(--muted); font-size:10.5px; font-family:monospace; letter-spacing:0.2px;">${parts[1]}</div>
          </div>
        `;
      }
      return `<div style="font-size:12px; color:var(--text); text-align:left;">${ts}</div>`;
    }

    function _getAuditActionBadge(action) {
      if (!action) return '';
      const act = action.toUpperCase();
      let bg = 'var(--s2)';
      let fg = 'var(--text-2)';
      let icon = 'settings';

      if (act.includes('LOGIN')) { bg = 'var(--green-ll)'; fg = 'var(--green)'; icon = 'login'; }
      else if (act.includes('LOGOUT')) { bg = 'var(--red-ll)'; fg = 'var(--red)'; icon = 'logout'; }
      else if (act.includes('ADD') || act.includes('SUBMIT')) { bg = 'var(--blue-ll)'; fg = 'var(--blue)'; icon = 'add_circle'; }
      else if (act.includes('EDIT') || act.includes('UPDATE')) { bg = 'var(--yellow-ll)'; fg = 'var(--yellow-d)'; icon = 'edit'; }
      else if (act.includes('DELETE') || act.includes('RESET') || act.includes('CLEAR')) { bg = 'var(--red-ll)'; fg = 'var(--red)'; icon = 'delete_forever'; }
      else if (act.includes('EXPORT') || act.includes('DOWNLOAD')) { bg = '#e0f2f1'; fg = '#00796b'; icon = 'file_download'; }
      else if (act.includes('APPROVE') || act.includes('ACCEPT')) { bg = 'var(--green-ll)'; fg = 'var(--green)'; icon = 'check_circle'; }
      else if (act.includes('REJECT') || act.includes('RETURN')) { bg = '#fff3e0'; fg = '#e65100'; icon = 'assignment_return'; }

      return `
        <span style="display:inline-flex; align-items:center; gap:5px; background:${bg}; color:${fg}; padding:4px 8px; border-radius:6px; font-size:11px; font-weight:700; border: 1px solid transparent; width:fit-content; text-transform:uppercase; letter-spacing:0.3px;">
          <span class="material-icons-round" style="font-size:14px; color:inherit;">${icon}</span>
          <span>${action}</span>
        </span>
      `;
    }

    function _formatAuditDetails(detail) {
      if (!detail) return '';
      if (detail.includes('|')) {
        const parts = detail.split('|').map(p => p.trim());
        let html = '<div style="display:flex; flex-wrap:wrap; gap:6px; align-items:center; justify-content:flex-start;">';
        parts.forEach(part => {
          const colonIdx = part.indexOf(':');
          if (colonIdx !== -1) {
            const key = part.substring(0, colonIdx).trim();
            const val = part.substring(colonIdx + 1).trim();
            let icon = 'info';
            let bg = 'var(--s2)';
            let fg = 'var(--text-2)';
            
            if (key === 'user') { icon = 'person'; bg = 'var(--blue-ll)'; fg = 'var(--blue)'; }
            else if (key === 'name') { icon = 'badge'; bg = 'var(--green-ll)'; fg = 'var(--green)'; }
            else if (key === 'agency') { icon = 'domain'; bg = 'var(--yellow-ll)'; fg = 'var(--yellow-d)'; }
            
            html += `
              <span style="display:inline-flex; align-items:center; gap:4px; background:${bg}; color:${fg}; padding:2.5px 8px; border-radius:6px; font-size:11px; font-weight:600; border: 1px solid transparent;">
                <span class="material-icons-round" style="font-size:13px; color:inherit;">${icon}</span>
                <span>${val}</span>
              </span>
            `;
          } else {
            html += `<span style="font-size:12px; color:var(--text-2); font-weight:500;">${part}</span>`;
          }
        });
        html += '</div>';
        return html;
      }
      return `<div style="font-size:12px; color:var(--text-2); font-weight:500; display:flex; align-items:center; gap:4px; text-align:left;">
        <span class="material-icons-round" style="font-size:14px; color:var(--muted); flex-shrink:0;">info_outline</span>
        <span>${detail}</span>
      </div>`;
    }

    function filterSystemAuditLogs() {
      const searchInput = document.getElementById('systemAuditSearchInput');
      const filterText = searchInput ? searchInput.value.toLowerCase().trim() : '';
      
      const filtered = _systemLogsCache.filter(log => {
        const timestamp = (log.timestamp || '').toLowerCase();
        const role = (log.role || '').toLowerCase();
        const action = (log.action || '').toLowerCase();
        const details = (log.details || log.detail || '').toLowerCase();
        return timestamp.includes(filterText) || role.includes(filterText) || action.includes(filterText) || details.includes(filterText);
      });
      
      renderAuditLogs(filtered, filterText);
    }

    function getMockMonitorData() {
      const agencies = Object.entries(AGENCY_MAP);
      const mockForms = [
        { formId:'F001', formName:'รายงานสถิติพื้นฐานประจำปี', agencyId:'ALL' },
        { formId:'F002', formName:'รายงานข้อมูลอาคารสถานที่', agencyId:'ALL' },
        { formId:'F003', formName:'รายงานผู้เรียนพิการ', agencyId:'ALL' }
      ];
      const statuses = ['อนุมัติแล้ว','รออนุมัติ','ส่งกลับแก้ไข',null,null];

      const agencySummary = agencies.map(([agId, agName]) => {
        const forms = mockForms.map((f, fi) => {
          const s = statuses[Math.floor(Math.random()*statuses.length)];
          return { formId: f.formId, formName: f.formName, latestStatus: s,
                   latestTimestamp: s ? `${Math.floor(Math.random()*14)+1}/04/2569 10:00:00` : null,
                   totalSubmits: s ? 1 : 0, pending: s==='รออนุมัติ'?1:0,
                   approved: s==='อนุมัติแล้ว'?1:0, rejected: s==='ส่งกลับแก้ไข'?1:0,
                   adminComment: s==='ส่งกลับแก้ไข'?'ข้อมูลไม่ครบ':'' };
        });
        const approved = forms.filter(f=>f.latestStatus==='อนุมัติแล้ว').length;
        const pending  = forms.filter(f=>f.latestStatus==='รออนุมัติ').length;
        const rejected = forms.filter(f=>f.latestStatus==='ส่งกลับแก้ไข').length;
        const notSent  = forms.filter(f=>!f.latestStatus).length;
        const submitted = forms.filter(f=>f.latestStatus).length;
        const latestForm = forms.filter(f=>f.latestTimestamp).sort((a,b)=>b.latestTimestamp.localeCompare(a.latestTimestamp))[0];
        return { agencyId:agId, agencyName:agName, totalForms:forms.length, submitted, approved,
                 pending, rejected, notSent, completionPct: Math.round((approved/forms.length)*100),
                 latestTimestamp: latestForm?.latestTimestamp||null, latestStatus: latestForm?.latestStatus||null, forms };
      });

      const tTotal   = agencySummary.reduce((s,a)=>s+a.totalForms,0);
      const tApprove = agencySummary.reduce((s,a)=>s+a.approved,0);
      const tPend    = agencySummary.reduce((s,a)=>s+a.pending,0);
      const tRej     = agencySummary.reduce((s,a)=>s+a.rejected,0);
      const tNone    = agencySummary.reduce((s,a)=>s+a.notSent,0);
      const timeline = agencySummary.flatMap(a => a.forms.filter(f=>f.latestTimestamp)
        .map(f=>({agencyId:a.agencyId, agencyName:a.agencyName, title:f.formName,
                  status:f.latestStatus, timestamp:f.latestTimestamp, comment:f.adminComment})))
        .sort((a,b)=>b.timestamp.localeCompare(a.timestamp)).slice(0,15);

      return { agencySummary, timeline,
               overall:{ allAgencies:13, totalForms:tTotal, totalApproved:tApprove,
                         totalPending:tPend, totalRejected:tRej, totalNotSent:tNone,
                         overallPct: Math.round((tApprove/tTotal)*100) },
               generatedAt: new Date().toLocaleString('th-TH') };
    }

    function renderMonitoringData(data) {
      if (!data) {
        showToast('Backend ส่งค่า null กลับมา — กรุณาตรวจสอบ code.gs', 'error');
        return;
      }
      if (data.success === false) {
          showToast(data.message || 'โหลดข้อมูลไม่สำเร็จ', 'warning');
        return;
      }
      if (data._error) {
        console.error('[Monitor] backend error:', data._error);
        showToast('Backend error: ' + data._error, 'error');
      }
      monitorData = data;
      const ov = data.overall || {};
      if (!data.agencySummary) data.agencySummary = [];
      if (!data.timeline)      data.timeline = [];

      // KPI Cards
      animateValue('mkpi-total',    0, ov.allAgencies || 0, 600);
      animateValue('mkpi-complete', 0, data.agencySummary.filter(a=>a.completionPct===100).length, 600);
      animateValue('mkpi-pending',  0, ov.totalPending, 600);
      animateValue('mkpi-rejected', 0, ov.totalRejected, 600);
      animateValue('mkpi-notsent',  0, ov.totalNotSent, 600);

      // Progress bar
      const pct = ov.overallPct || 0;
      document.getElementById('mkpi-pct').innerText = pct + '%';
      setTimeout(() => {
        const bar = document.getElementById('overallProgressBar');
        if (bar) {
          bar.style.width = pct + '%';
          bar.style.background = pct >= 80
            ? 'linear-gradient(90deg,var(--green),#34a853)'
            : pct >= 50
              ? 'linear-gradient(90deg,var(--yellow),#fbbc04)'
              : 'linear-gradient(90deg,var(--red),#ea4335)';
        }
      }, 100);

      document.getElementById('monitorLastUpdate').innerText = 'อัปเดตล่าสุด: ' + (data.generatedAt || '—');
      document.getElementById('monitorSummaryText').innerText =
        `อนุมัติแล้ว ${ov.totalApproved} / ${ov.totalForms} ฉบับ (${pct}%)`;

      // Badge blink ถ้ายังมีค้าง
      const badge = document.getElementById('monitorBadge');
      if (badge) badge.classList.toggle('active', ov.totalNotSent > 0 || ov.totalRejected > 0);

      // Reminder button
      const btnR = document.getElementById('btnSendReminder');
      if (btnR) btnR.style.display = (ov.totalNotSent > 0 || ov.totalRejected > 0) ? 'inline-flex' : 'none';

      renderMonitorTable(data.agencySummary);
      renderTimeline(data.timeline);
    }

    function statusBadgeHtml(status) {

        'ส่งกลับแก้ไข': `<span class="badge" style="background:var(--red-ll);color:var(--red-d);border:1px solid var(--red-l);">⚠️ ส่งกลับแก้ไข</span>`
      };
      return map[status] || `<span class="badge" style="background:var(--s2);color:var(--muted);">— ยังไม่ส่ง</span>`;

    function filterMonitorTable() {
      if (!monitorData) return;
      const search = (document.getElementById('monitorSearchInput')?.value||'').toLowerCase();
      const sf     = document.getElementById('monitorStatusFilter')?.value || 'all';

      const rows  = document.querySelectorAll('#monitorTableBody tr[data-agency-id]');
      rows.forEach(tr => {
        const agId  = tr.getAttribute('data-agency-id');
        const agData = monitorData.agencySummary.find(a=>a.agencyId===agId);
        if (!agData) return;

        let show = agData.agencyName.toLowerCase().includes(search);
        if (show && sf !== 'all') {
          if (sf === 'complete') show = agData.completionPct === 100;
          if (sf === 'partial')  show = agData.submitted > 0 && agData.completionPct < 100 && agData.rejected === 0;
          if (sf === 'none')     show = agData.submitted === 0;
          if (sf === 'rejected') show = agData.rejected > 0;
        }
        tr.style.display = show ? '' : 'none';

        // ซ่อน detail row ด้วย
        const dr = document.getElementById('detail-row-' + agId);
        if (dr) dr.style.display = 'none';
      });
    }

    function exportMonitorCSV() {
      if (!monitorData) { showToast('ยังไม่มีข้อมูล กรุณารอสักครู่', 'warning'); return; }
      let csv = 'สังกัด,ฟอร์มทั้งหมด,ส่งแล้ว,อนุมัติ,รออนุมัติ,ส่งกลับ,ยังไม่ส่ง,ความครบถ้วน(%)\n';
      monitorData.agencySummary.forEach(a => {
        csv += `"${a.agencyName}",${a.totalForms},${a.submitted},${a.approved},${a.pending},${a.rejected},${a.notSent},${a.completionPct}%\n`;
      });
      const blob = new Blob(['\ufeff'+csv], { type:'text/csv;charset=utf-8;' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url; a.download = `Monitor_Report_${new Date().getTime()}.csv`; a.click();
      URL.revokeObjectURL(url);
      showToast('ดาวน์โหลด CSV กำกับติดตามสำเร็จ', 'success');
    }

    let _mgmtAgencyId   = null;

    // ── 1. Audit Log Modal ──────────────────────────────────────────
    let _agencyLogsCache = [];

    function openAgencyAuditLogModal(agencyId, agencyName) {
      _mgmtAgencyId   = agencyId;
      _mgmtAgencyName = agencyName;

      const modal   = document.getElementById('agencyAuditLogModal');
      const loading = document.getElementById('agencyAuditLogLoading');
      const empty   = document.getElementById('agencyAuditLogEmpty');
      const table   = document.getElementById('agencyAuditLogTable');
      const counter = document.getElementById('agencyAuditCountDisplay');
      
      const titleEl = document.getElementById('agencyAuditLogTitleName');
      if (titleEl) titleEl.innerText = agencyName;

      // Reset search filter input
      const searchInput = document.getElementById('agencyAuditSearchInput');
      if (searchInput) searchInput.value = '';

      if (!modal) return;
      modal.style.display = 'flex';
      loading.style.display = 'flex';
      empty.style.display   = 'none';
      table.style.display   = 'none';
      if (counter) counter.innerText = '';

      if (typeof google !== 'undefined' && google.script) {
        google.script.run
          .withSuccessHandler(res => {
            loading.style.display = 'none';
            if (!res || !res.success || !res.logs || res.logs.length === 0) {
              _agencyLogsCache = [];
              empty.style.display = 'block';
              return;
            }
            _agencyLogsCache = res.logs;
            renderAgencyAuditLogs(res.logs);
          })
          .withFailureHandler(() => {
            loading.style.display = 'none';
            empty.style.display = 'block';
            showToast('โหลด Audit Log ไม่สำเร็จ', 'error');
          })
          .getAgencyAuditLog({ sessionToken: AppState.sessionToken, agencyId: agencyId });
      } else {
        // Mock data for preview when google is undefined
        setTimeout(() => {
          loading.style.display = 'none';
          const mockAgencyLogs = [
            {timestamp: "05/06/2026 05:15:55", role: "agency", action: "LOGIN", detail: `user:obec1 | name:จนท. ${agencyName} | agency:${agencyId}`},
            {timestamp: "04/06/2026 15:53:35", role: "agency", action: "Export CSV", detail: `${agencyName} - 2 แถว`},
            {timestamp: "04/06/2026 12:33:32", role: "agency", action: "Submit Data", detail: `รายงานสถิติ: รายงานสถิติภาพรวม ${agencyName} [รออนุมัติ]`}
          ];
          _agencyLogsCache = mockAgencyLogs;
          renderAgencyAuditLogs(mockAgencyLogs);
        }, 500);
      }
    }

    function filterAgencyAuditLogs() {
      const searchInput = document.getElementById('agencyAuditSearchInput');
      const filterText = searchInput ? searchInput.value.toLowerCase().trim() : '';

      const filtered = _agencyLogsCache.filter(log => {
        const timestamp = (log.timestamp || '').toLowerCase();
        const role = (log.role || '').toLowerCase();
        const action = (log.action || '').toLowerCase();
        const details = (log.details || log.detail || '').toLowerCase();
        return timestamp.includes(filterText) || role.includes(filterText) || action.includes(filterText) || details.includes(filterText);
      });

      renderAgencyAuditLogs(filtered, filterText);
    }

    function renderAgencyAuditLogs(logs, filterText = '') {
      const tbody = document.getElementById('agencyAuditLogBody');
      if (!tbody) return;
      tbody.innerHTML = '';

      const table = document.getElementById('agencyAuditLogTable');
      const empty = document.getElementById('agencyAuditLogEmpty');

      if (!logs || logs.length === 0) {
        if (table) table.style.display = 'none';
        if (empty) empty.style.display = 'block';
        return;
      }

      if (table) table.style.display = 'table';
      if (empty) empty.style.display = 'none';

      logs.forEach(log => {
        const roleColors = { super_admin:'#d93025', admin:'var(--blue)', agency:'var(--green)', SYSTEM:'var(--muted)' };
        const roleColor  = roleColors[log.role] || 'var(--text-2)';
        
        const roleBadge = `<span class="badge" style="background:${roleColor}12; color:${roleColor}; border-color:${roleColor}40; font-weight:700;">${log.role}</span>`;

        tbody.innerHTML += `
          <tr style="transition:background var(--t);">
            <td style="padding:12px 16px; border-bottom:1px solid var(--border-l); vertical-align:middle;">${_formatAuditTimestamp(log.timestamp)}</td>
            <td style="padding:12px 16px; border-bottom:1px solid var(--border-l); vertical-align:middle;">${roleBadge}</td>
            <td style="padding:12px 16px; border-bottom:1px solid var(--border-l); vertical-align:middle;">${_getAuditActionBadge(log.action)}</td>
            <td style="padding:12px 16px; border-bottom:1px solid var(--border-l); vertical-align:middle;">${_formatAuditDetails(log.detail || log.details)}</td>
          </tr>
        `;
      });

      // Update count display
      const counter = document.getElementById('agencyAuditCountDisplay');
      if (counter) {
        if (filterText) {
          counter.innerText = `พบ ${logs.length} จาก ${_agencyLogsCache.length} รายการ`;
        } else {
          counter.innerText = `แสดง ${logs.length} รายการล่าสุด`;
        }
      }
    }

    function closeAgencyAuditLogModal() {
      const modal = document.getElementById('agencyAuditLogModal');
      if (modal) modal.style.display = 'none';
    }

    function executeBulkAction() {
      const selected = document.querySelector('input[name="bulkAction"]:checked');
      if (!selected) { showToast('กรุณาเลือกการดำเนินการก่อน', 'warning'); return; }
      const action  = selected.value;
      const comment = (document.getElementById('bulkComment').value || '').trim();
      if (action === 'ส่งกลับแก้ไข' && !comment) {
        showToast('กรุณาระบุเหตุผลก่อนส่งกลับ', 'warning');
        document.getElementById('bulkComment').focus();
        return;
      }

      const btn     = document.getElementById('btnDoBulkAction');
      const origHtml = btn.innerHTML;
      btn.disabled  = true;
      btn.innerHTML = '<span class="material-icons-round" style="font-size:14px;animation:spin .8s linear infinite;">refresh</span> กำลังดำเนินการ...';

      const payload = { sessionToken: AppState.sessionToken, agencyId: _mgmtAgencyId, action: action, comment: comment };

      if (typeof google !== 'undefined' && google.script) {
        google.script.run
          .withSuccessHandler(res => {
            btn.disabled = false; btn.innerHTML = origHtml;
            if (res && res.success) {
              Swal.fire({
                title: action === 'อนุมัติแล้ว' ? '✅ อนุมัติสำเร็จ' : '↩️ ส่งกลับสำเร็จ',
                html: `<strong>${_mgmtAgencyName}</strong><br>${res.message}`,
                icon: 'success', confirmButtonColor: 'var(--blue)'
              });
              closeBulkActionModal();
              if (action === 'อนุมัติแล้ว') shootConfetti();
              setTimeout(() => loadMonitoringData(), 800);
            } else {
              showToast(res?.message || 'ดำเนินการไม่สำเร็จ', 'error');
            }
          })
          .withFailureHandler(() => {
            btn.disabled = false; btn.innerHTML = origHtml;
            showToast('เชื่อมต่อ Server ไม่สำเร็จ', 'error');
          })
          .bulkApproveReject(payload);
      } else {
        setTimeout(() => {
          btn.disabled = false; btn.innerHTML = origHtml;
          showToast('Bulk Action สำเร็จ (Mock Mode)', 'success');
          closeBulkActionModal();
        }, 800);
      }
    }

    // ── 3. Export CSV ───────────────────────────────────────────────
    function exportAgencyCSV(agencyId, agencyName) {
      showToast(`กำลังเตรียมข้อมูล CSV ของ ${agencyName}...`, 'info');

      if (typeof google !== 'undefined' && google.script) {
        google.script.run
          .withSuccessHandler(res => {
            if (!res || !res.success) {
              showToast(res?.message || 'Export ไม่สำเร็จ', 'error');
              return;
            }
            // Client-side download
            const BOM  = '\uFEFF';
            const blob = new Blob([BOM + res.csv], { type: 'text/csv;charset=utf-8;' });
            const url  = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href     = url;
            link.download = res.filename || `EduStat_${agencyId}.csv`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            showToast(`Export สำเร็จ — ${res.rowCount} แถว`, 'success');
          })
          .withFailureHandler(() => showToast('Export ล้มเหลว', 'error'))
          .exportAgencyDataCSV({ sessionToken: AppState.sessionToken, agencyId: agencyId });
      } else {
        // Mock fallback
        const csv = `"ID","วันเวลา","รหัสสังกัด","ชื่อสังกัด","รหัสฟอร์ม","ชื่อรายงาน","สถานะ","หมายเหตุ"\n"RPT_001","01/06/2568 09:00:00","${agencyId}","${agencyName}","FORM_01","แบบฟอร์มทดสอบ","รออนุมัติ",""`;
        const BOM  = '\uFEFF';
        const blob = new Blob([BOM + csv], { type: 'text/csv;charset=utf-8;' });
        const url  = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url; link.download = `EduStat_${agencyId}_mock.csv`;
        document.body.appendChild(link); link.click();
        document.body.removeChild(link); URL.revokeObjectURL(url);
        showToast('Export สำเร็จ (Mock Mode)', 'success');
      }
    }

              detail: 'ดาวน์โหลดไฟล์รายงาน PDF สรุปของ สพม. แล้วแสดงหน้ากระดาษล้นตัดแถวด้านข้าง รบกวนตรวจแก้ให้ด้วยค่ะ',
              status: 'กำลังแก้ไข',

            },
            {
              timestamp: '29/06/2569 15:02:11',
              reporterName: 'นายอรรถพล โคตรคำ',

    function renderHelpdeskTickets(filteredTickets) {
      const tickets = filteredTickets || _helpdeskTickets;
      const tableBody = document.getElementById('helpdeskTableBody');
      if (!tableBody) return;

      if (tickets.length === 0) {
        tableBody.innerHTML = `<tr><td colspan="7" style="text-align:center; padding:40px; color:var(--muted);">ไม่พบบันทึกการแจ้งปัญหาใดๆ ตามเงื่อนไขค้นหา</td></tr>`;
        updateHelpdeskStats([]);
        return;
      }

      // อัปเดตการแสดงยอดสะสมสถิติการดึงค่าเริ่มต้น
      updateHelpdeskStats(_helpdeskTickets);

      let html = '';
      tickets.forEach(ticket => {
        let badgeStyle = '';
        let badgeText = ticket.status || 'รอดำเนินการ';

        if (badgeText === 'แก้ไขแล้ว' || badgeText === 'เสร็จสิ้น') {
          badgeStyle = 'background:var(--green-ll); color:var(--green); border:1px solid var(--green-l);';
        } else if (badgeText === 'กำลังแก้ไข' || badgeText === 'อยู่ระหว่างดำเนินการ') {
          badgeStyle = 'background:var(--blue-ll); color:var(--blue); border:1px solid var(--blue-l);';
        } else {
          badgeStyle = 'background:var(--red-ll); color:var(--red-d); border:1px solid var(--red-l);';
        }

        const resolveHtml = ticket.resolveComment 
          ? `<span style="font-weight: 500; color: var(--text-2); font-size:12px;">💬 ${ticket.resolveComment}</span>`
          : `<span style="color: var(--muted); font-size:11.5px; font-style:italic;">ยังไม่ได้รับการแก้ไข</span>`;

        // Escape JSON parameters
        const escapedTimestamp = encodeURIComponent(ticket.timestamp);
        const escapedReporter = encodeURIComponent(ticket.reporterName);

        html += `
          <tr>
            <td style="font-size:12px; color:var(--muted); font-weight:500;">${formatThaiDateTime(ticket.timestamp)}</td>
            <td style="font-weight:600; color:var(--text); font-size:13px;">
              ${ticket.reporterName}
              <div style="font-size:11px; color:var(--subtle); font-weight:normal; margin-top:2px;">🏢 ${ticket.agency}</div>
            </td>
            <td style="font-size:12.5px; color:var(--text-2); font-family:monospace;">${formatContactNumber(ticket.contact)}</td>
            <td style="font-size:13px; color:var(--text); line-height:1.5; font-weight: 500;">${ticket.detail}</td>
            <td><span class="badge" style="${badgeStyle}">${badgeText}</span></td>
            <td>${resolveHtml}</td>
            <td>
              <button class="btn btn-outlined btn-ghost" onclick="openAdminManageIssueModal('${escapedTimestamp}', '${escapedReporter}')" style="padding:4px 8px; font-size:11.5px; height: 28px; color: var(--blue); border-color: var(--blue-l);">
                <span class="material-icons-round" style="font-size:14px; margin-right:2px;">edit</span> จัดการ
              </button>
            </td>
          </tr>
        `;
      });

      tableBody.innerHTML = html;
    }

    function updateHelpdeskStats(allTickets) {
      const allCount = allTickets.length;
      const pendingCount = allTickets.filter(t => t.status === 'รอดำเนินการ').length;
      const progressCount = allTickets.filter(t => t.status === 'กำลังแก้ไข' || t.status === 'อยู่ระหว่างดำเนินการ').length;
      const solvedCount = allTickets.filter(t => t.status === 'แก้ไขแล้ว' || t.status === 'เสร็จสิ้น').length;

      const elAll = document.getElementById('hd-stat-all');
      const elPending = document.getElementById('hd-stat-pending');
      const elProgress = document.getElementById('hd-stat-progress');
      const elSolved = document.getElementById('hd-stat-solved');

      if (elAll) elAll.innerText = allCount;
      if (elPending) elPending.innerText = pendingCount;
      if (elProgress) elProgress.innerText = progressCount;
      if (elSolved) elSolved.innerText = solvedCount;
    }

    function filterHelpdeskTickets() {
      const query = document.getElementById('helpdeskSearchInput').value.toLowerCase().trim();
      const statusFilter = document.getElementById('helpdeskStatusFilter').value;

      const filtered = _helpdeskTickets.filter(ticket => {
        const matchesQuery = 
          !query || 
          (ticket.reporterName || '').toLowerCase().includes(query) ||
          (ticket.agency || '').toLowerCase().includes(query) ||
          (ticket.contact || '').toLowerCase().includes(query) ||
          (ticket.detail || '').toLowerCase().includes(query);

        const matchesStatus = 
          statusFilter === 'ALL' || 
          (statusFilter === 'รอดำเนินการ' && ticket.status === 'รอดำเนินการ') ||
          (statusFilter === 'กำลังแก้ไข' && (ticket.status === 'กำลังแก้ไข' || ticket.status === 'อยู่ระหว่างดำเนินการ')) ||
          (statusFilter === 'แก้ไขแล้ว' && (ticket.status === 'แก้ไขแล้ว' || ticket.status === 'เสร็จสิ้น'));

        return matchesQuery && matchesStatus;
      });

      renderHelpdeskTickets(filtered);
    }

    function openAdminManageIssueModal(escapedTimestamp, escapedReporter) {
      const ts = decodeURIComponent(escapedTimestamp);
      const rep = decodeURIComponent(escapedReporter);

      const ticket = _helpdeskTickets.find(t => t.timestamp === ts && t.reporterName === rep);
      if (!ticket) {
        showToast('ไม่พบข้อมูลตั๋วปัญหาดังกล่าวในหน่วยความจำ', 'error');
        return;
      }

      // เติมข้อมูลลงฟอร์ม
      document.getElementById('amiTicketTimestamp').value = ticket.timestamp;
      document.getElementById('amiTicketReporter').value = ticket.reporterName;
      
      document.getElementById('amiDisplayTimestamp').innerText = formatThaiDateTime(ticket.timestamp);
      document.getElementById('amiDisplayReporter').innerText = ticket.reporterName;
      document.getElementById('amiDisplayAgency').innerText = ticket.agency || 'ไม่ระบุ';
      document.getElementById('amiDisplayContact').innerText = formatContactNumber(ticket.contact) || 'ไม่ระบุ';
      document.getElementById('amiDisplayDetail').innerText = ticket.detail || 'ไม่ระบุ';
      
      document.getElementById('amiTicketStatus').value = ticket.status === 'อยู่ระหว่างดำเนินการ' ? 'กำลังแก้ไข' : (ticket.status === 'เสร็จสิ้น' ? 'แก้ไขแล้ว' : ticket.status);
      document.getElementById('amiResolveComment').value = ticket.resolveComment || '';

      // แสดงโมดอล
      const bd = document.getElementById('modalBackdrop');
      if (bd) bd.classList.add('on');
      
      const mc = document.getElementById('adminManageIssueModal');
      if (mc) mc.style.display = 'block';
    }

    function submitUpdateTicketStatus(e) {
      e.preventDefault();

      const timestamp = document.getElementById('amiTicketTimestamp').value;
      const reporterName = document.getElementById('amiTicketReporter').value;
      const status = document.getElementById('amiTicketStatus').value;
      const resolveComment = document.getElementById('amiResolveComment').value.trim();

      const payload = {
        sessionToken: AppState.sessionToken,
        userRole: AppState.userRole,
        timestamp: timestamp,
        reporterName: reporterName,
        status: status,
        resolveComment: resolveComment
      };

      Swal.showLoading();
      if (typeof google !== 'undefined' && google.script) {
        google.script.run
          .withSuccessHandler(res => {
            Swal.close();
            if (res.success) {
              Swal.fire({
                title: 'อัปเดตตั๋วปัญหาสำเร็จ',
                text: res.message,
                icon: 'success',
                confirmButtonColor: 'var(--blue)'
              }).then(() => {
                closeModals();
                loadHelpdeskTickets(); // โหลดรายการใหม่หลังจากเซฟแล้ว
              });
            } else {
              Swal.fire('เกิดข้อผิดพลาด', res.message, 'error');
            }
          })
          .withFailureHandler(() => {
            Swal.close();
            showToast('ล้มเหลวในการส่งข้อมูลไปอัปเดตตั๋ว', 'error');
          })
          .updateSystemIssueBackend(payload);
      } else {
        // Mock Mode for testing
        setTimeout(() => {
          Swal.close();
          // อัปเดตในอาเรย์ชั่วคราว
          const idx = _helpdeskTickets.findIndex(t => t.timestamp === timestamp && t.reporterName === reporterName);
          if (idx !== -1) {
            _helpdeskTickets[idx].status = status;
            _helpdeskTickets[idx].resolveComment = resolveComment;
          }
          
          Swal.fire({
            title: 'อัปเดตตั๋วปัญหาสำเร็จ (Mock)',
            text: 'บันทึกการตอบกลับในระบบเรียบร้อยแล้ว',
            icon: 'success',
            confirmButtonColor: 'var(--blue)'
          }).then(() => {
            closeModals();
            renderHelpdeskTickets();
          });
        }, 800);
      }
    }


  </script>
