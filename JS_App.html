    // 3.2: เรนเดอร์ฟอร์มที่ผู้ใช้เลือก
    // 3.2.1: เรนเดอร์ตารางแก้ไขได้ (Editable Table / Grid Input)
    function renderEditableTable(formObj, container, agencyId) {
      const config = formObj.formConfig;
      const columns = config.filter(f => f.type !== 'section' && f.name !== 'report_title');
      const draftKey = `eduDataDraft_${agencyId}_${formObj.formId}`;
      
      let rows = [{}];
      try {
        const saved = JSON.parse(localStorage.getItem(draftKey));
        if (saved && Array.isArray(saved) && saved.length > 0) {
          rows = saved;
        }
      } catch(e){}

      // สร้าง Wrapper หลักครอบทั้งส่วนตารางและปุ่ม (เพื่อความคุมขนาดเป็นแบบเต็มหน้ากว้างสองคอลัมน์กริต)
      const outerWrapper = document.createElement('div');
      outerWrapper.style.gridColumn = 'span 2';
      outerWrapper.style.width = '100%';
      outerWrapper.style.display = 'flex';
      outerWrapper.style.flexDirection = 'column';
      outerWrapper.style.gap = '16px';

      // กล่องคำแนะนำระดับโลก
      const tipBox = document.createElement('div');
      tipBox.style.background = 'var(--blue-ll)';
      tipBox.style.color = 'var(--blue-dd)';
      tipBox.style.padding = '14px 20px';
      tipBox.style.borderRadius = '12px';
      tipBox.style.fontSize = '13.5px';
      tipBox.style.lineHeight = '1.6';
      tipBox.style.border = '1px solid var(--blue-l)';
      tipBox.style.display = 'flex';
      tipBox.style.alignItems = 'center';
      tipBox.style.gap = '12px';
      tipBox.innerHTML = `<span class="material-icons-round" style="color:var(--blue); font-size:22px; flex-shrink:0;">info</span>
        <span><strong>💡 เคล็ดลับการทำงานคีย์บอร์ดระดับโลก:</strong> คุณสามารถป้อนช่องปกติ หรือคัดลอกกลุ่มข้อมูลโรงเรียน (เช่น 45 โรงเรียน) จาก <strong>Microsoft Excel / Google Sheets</strong> แล้วเลือกช่องแรกในตารางด้านล่างและกด <strong>Ctrl + V (วาง)</strong> เพื่อให้ข้อมูลกระจายลงแถวทั้งหมดให้อัตโนมัติในวินาทีเดียวครับ!</span>`;
      outerWrapper.appendChild(tipBox);

      // สร้างกล่องหุ้มตาราง
      const wrapper = document.createElement('div');
      wrapper.className = 'et-wrapper';
      wrapper.style.margin = '0';
      
      const table = document.createElement('table');
      table.className = 'et-table';
      
      // เรนเดอร์หัวตารางแบบกำหนดความกว้างตามความเหมาะสมของข้อมูล
      let ths = columns.map(col => {
        let minWidth = '150px';
        if (col.name.indexOf('address') >= 0 || col.name.indexOf('detail') >= 0) minWidth = '320px';
        else if (col.name.indexOf('name') >= 0 || col.name.indexOf('notes') >= 0) minWidth = '240px';
        else if (col.type === 'number') minWidth = '100px';
        return `<th style="min-width:${minWidth};">${col.label} ${col.required ? '<span style="color:var(--red)">*</span>' : ''}</th>`;
      }).join('');
      
      table.innerHTML = `<thead><tr><th style="width:50px;text-align:center;">#</th>${ths}<th style="width:50px;text-align:center;">ลบ</th></tr></thead><tbody id="et-tbody"></tbody>`;
      wrapper.appendChild(table);
      outerWrapper.appendChild(wrapper);
      container.appendChild(outerWrapper);

      const tbody = table.querySelector('#et-tbody');

      // ฟังก์ชันเรนเดอร์แถวเดี่ยว
      function renderRow(rowData, index) {
        const tr = document.createElement('tr');
        tr.dataset.idx = index;
        
        let colsHtml = `<td style="text-align:center;font-weight:600;color:var(--subtle);vertical-align:middle;">${index + 1}</td>`;
        
        columns.forEach(col => {
          let val = rowData[col.name] || '';
          let fieldHtml = '';
          
          if (col.type === 'select' && col.opts) {
            const optList = col.opts.split('|').map(o=>o.trim()).filter(Boolean);
            fieldHtml = `<select name="${col.name}" ${col.required?'required':''}><option value="">-- เลือก --</option>${optList.map(o=>`<option value="${o}" ${val===o?'selected':''}>${o}</option>`).join('')}</select>`;
          } else if (col.type === 'textarea') {
            fieldHtml = `<textarea name="${col.name}" rows="1" ${col.required?'required':''} style="height:32px;resize:vertical;">${val}</textarea>`;
          } else if (col.type === 'date') {
            fieldHtml = `<input type="date" name="${col.name}" value="${val}" ${col.required?'required':''} />`;
          } else if (col.type === 'number') {
            const minAttr = col.min !== undefined ? ` min="${col.min}"` : '';
            fieldHtml = `<input type="number" name="${col.name}" value="${val}" ${col.required?'required':''}${minAttr} />`;
          } else {
            fieldHtml = `<input type="${col.type||'text'}" name="${col.name}" value="${val}" ${col.required?'required':''} />`;
          }
          colsHtml += `<td style="vertical-align:middle;">${fieldHtml}</td>`;
        });
        
        colsHtml += `<td style="text-align:center;vertical-align:middle;"><button class="et-btn-del" type="button" title="ลบแถวนี้"><span class="material-icons-round" style="font-size:16px;">delete</span></button></td>`;
        tr.innerHTML = colsHtml;
        
        // ผูก Event หยอด Draft อัตโนมัติเมื่อคีย์
        tr.querySelectorAll('input, select, textarea').forEach(el => {
          el.addEventListener('input', () => {
            saveTableDraft();
          });
        });

        // ปุ่มลบแถว
        tr.querySelector('.et-btn-del').addEventListener('click', () => {
          tr.remove();
          reindexRows();
          saveTableDraft();
        });

        return tr;
      }

      // ดึงแถวที่มีอยู่ในร่างลงตาราง
      rows.forEach((r, idx) => {
        tbody.appendChild(renderRow(r, idx));
      });

      // ปุ่มเพิ่มแถวใหม่
      const btnAdd = document.createElement('button');
      btnAdd.type = 'button';
      btnAdd.className = 'et-btn-add';
      btnAdd.style.alignSelf = 'flex-start';
      btnAdd.style.marginTop = '4px';
      btnAdd.innerHTML = '<span class="material-icons-round" style="font-size:18px;">add</span> เพิ่มแถวใหม่';
      btnAdd.addEventListener('click', () => {
        tbody.appendChild(renderRow({}, tbody.children.length));
        saveTableDraft();
      });
      outerWrapper.appendChild(btnAdd);

      // ดัก Event วางข้อมูล (Paste) จาก Excel/Google Sheets
      table.addEventListener('paste', (e) => {
        const clipboardData = e.clipboardData || window.clipboardData;
        const pastedData = clipboardData.getData('Text');
        if (!pastedData) return;
        
        const pasteRows = pastedData.split('\n').map(r => r.split('\t').map(c => c.trim())).filter(r => r.length > 0 && r.join('').trim() !== '');
        if (pasteRows.length > 0) {
          e.preventDefault();
          const activeEl = document.activeElement;
          if (activeEl && (activeEl.tagName === 'INPUT' || activeEl.tagName === 'TEXTAREA')) {
            const tr = activeEl.closest('tr');
            const startRowIdx = Array.from(tbody.children).indexOf(tr);
            const startColName = activeEl.name;
            const startColIdx = columns.findIndex(c => c.name === startColName);
            
            if (startRowIdx !== -1 && startColIdx !== -1) {
              pasteRows.forEach((pRow, rOffset) => {
                let targetRowIdx = startRowIdx + rOffset;
                while (tbody.children.length <= targetRowIdx) {
                  tbody.appendChild(renderRow({}, tbody.children.length));
                }
                const targetTr = tbody.children[targetRowIdx];
                pRow.forEach((pVal, cOffset) => {
                  let targetColIdx = startColIdx + cOffset;
                  if (targetColIdx < columns.length) {
                    const colObj = columns[targetColIdx];
                    const inputEl = targetTr.querySelector(`[name="${colObj.name}"]`);
                    if (inputEl) {
                      inputEl.value = pVal;
                      inputEl.dispatchEvent(new Event('input'));
                    }
                  }
                });
              });
              saveTableDraft();
            }
          }
        }
      });

      // จัดตัวเลขแถวใหม่หลังจากลบ
      function reindexRows() {
        Array.from(tbody.children).forEach((tr, idx) => {
          tr.dataset.idx = idx;
          tr.children[0].innerText = idx + 1;
        });
      }

      // บันทึกตารางลงร่าง Local Storage
      function saveTableDraft() {
        const tableData = [];
        Array.from(tbody.children).forEach(tr => {
          const rowObj = {};
          columns.forEach(col => {
            const el = tr.querySelector(`[name="${col.name}"]`);
            if (el) rowObj[col.name] = el.value;
          });
          if (Object.values(rowObj).filter(Boolean).length > 0) {
            tableData.push(rowObj);
          }
        });
        localStorage.setItem(draftKey, JSON.stringify(tableData));
      }
    }

    function saveDraftToLocal() {
      let ag = AppState.userRole === 'agency' ? AppState.userAgencyId : (document.getElementById('entryAgencySelect') ? document.getElementById('entryAgencySelect').value : '');
      let formId = document.getElementById('entryFormSelect').value;
      if(!ag || !formId) return;
      const formData = {};
      const form = document.getElementById('dynamicEntryForm');
      if(!form) return;
      const inputs = form.elements;
      for (let i = 0; i < inputs.length; i++) {
        const el = inputs[i];
        if (!el.name) continue;
        if (el.type === 'checkbox') formData[el.name] = el.checked ? '1' : '0';
        else if (el.type === 'radio') { if (el.checked) formData[el.name] = el.value; }
        else formData[el.name] = el.value;
      }
      localStorage.setItem(`eduDataDraft_${ag}_${formId}`, JSON.stringify(formData));
    }

    function handleCSVUpload(e) {
      const file = e.target.files[0];
      if(!file) return;
      
      const reader = new FileReader();
      reader.onload = function(event) {
        const text = event.target.result;
        const rows = text.split('\n');
        
        if(rows.length < 2) {
          showToast('ไฟล์ CSV ไม่ถูกต้อง หรือไม่มีข้อมูล', 'error');
          return;
        }
        
        const headers = rows[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
        const values = rows[1].split(',').map(v => v.trim().replace(/^"|"$/g, ''));
        
        let matchCount = 0;
        headers.forEach((header, index) => {
          const input = document.querySelector(`#dynamicEntryForm input[name="${header}"]`);
          if(input && values[index] !== undefined && header !== 'report_title') { 
            input.value = values[index];
            matchCount++;
          }
        });
        
        if(matchCount > 0) {
          showToast(`นำเข้าข้อมูลสำเร็จ แมปข้อมูลเข้าฟอร์ม ${matchCount} ฟิลด์`, 'success');
          saveDraftToLocal(); 
        } else {
          showToast('ไม่พบหัวคอลัมน์ใน CSV ที่ตรงกับแบบฟอร์มนี้เลย', 'warning');
        }
        e.target.value = ''; 
      };
      reader.readAsText(file);
    }

    function handleEntrySubmit(e) {
      e.preventDefault();
      const btn = document.getElementById('btnSubmitData');
      if(btn) {
          btn.disabled = true; 
          btn.innerHTML = 'กำลังบันทึก...';
      }
      
      let ag = AppState.userRole === 'agency' ? AppState.userAgencyId : document.getElementById('entryAgencySelect').value;
      let formId = document.getElementById('entryFormSelect').value;
      
      const selectedFormObj = AppState.availableForms.find(f => f.formId === formId);
      const isMultiRow = selectedFormObj && selectedFormObj.isMultiRow;
      
      const formData = {};
      const form = document.getElementById('dynamicEntryForm');
      
      if (isMultiRow) {
        formData.report_title = selectedFormObj.formName;
        formData.isMultiRow = true;
        formData.rows = [];
        const tbody = document.getElementById('et-tbody');
        if (tbody) {
          const columns = selectedFormObj.formConfig.filter(f => f.type !== 'section' && f.name !== 'report_title');
          Array.from(tbody.children).forEach(tr => {
            const rowObj = {};
            let hasVal = false;
            columns.forEach(col => {
              const el = tr.querySelector(`[name="${col.name}"]`);
              if (el) {
                rowObj[col.name] = el.value;
                if (el.value.trim()) hasVal = true;
              }
            });
            if (hasVal) {
              formData.rows.push(rowObj);
            }
          });
        }
        if (formData.rows.length === 0) {
          showToast('กรุณากรอกข้อมูลในตารางอย่างน้อย 1 แถว', 'warning');
          if(btn) {
              btn.disabled = false; 
              btn.innerHTML = '<span class="material-icons-round">cloud_upload</span> บันทึกและส่งข้อมูล';
          }
          return;
        }
      } else {
        const inputs = form ? form.elements : [];
        for (let i = 0; i < inputs.length; i++) {
          const el = inputs[i];
          if (!el.name) continue;
          if (el.type === 'checkbox') {
            formData[el.name] = el.checked ? '1' : '0';
          } else if (el.type === 'radio') {
            if (el.checked) formData[el.name] = el.value;
            else if (!(el.name in formData)) formData[el.name] = '';
          } else {
            formData[el.name] = el.value;
          }
        }
      }

      const payload = { id: AppState.activeSubmissionId || '', agencyId: ag, formId: formId, formData: formData, userRole: AppState.userRole, userAgencyId: AppState.userAgencyId, sessionToken: AppState.sessionToken };

      if (typeof google !== 'undefined' && google.script) {
        google.script.run
          .withSuccessHandler(res => {
            if(_checkSessionExpired(res)) return;
            if(btn) {
                btn.disabled = false;
                btn.innerHTML = '<span class="material-icons-round">cloud_upload</span> บันทึกและส่งข้อมูล';
            }
            if(res.success) {
              showToast(res.message, 'success');
              shootConfetti();
              AppState.activeSubmissionId = null;
              if(e.target) e.target.reset(); 
              let draftKey = `eduDataDraft_${ag}_${formId}`;
              localStorage.removeItem(draftKey); 
              if(form) form.style.display = 'none'; 
              
              document.getElementById('entryFormSelect').value = '';
              if(AppState.userRole !== 'agency') {
                const entryAgencySelect = document.getElementById('entryAgencySelect');
                if(entryAgencySelect) entryAgencySelect.value = '';
                document.getElementById('formSelectContainer').style.display = 'none';
              }
              
              updateNotificationBadge(); 
            }
            else showToast(res.message, 'error');
          })
          .withFailureHandler(() => {
            if(btn) {
                btn.disabled = false; 
                btn.innerHTML = '<span class="material-icons-round">cloud_upload</span> บันทึกและส่งข้อมูล';
            }
            showToast('บันทึกไม่สำเร็จ การเชื่อมต่อมีปัญหา', 'error');
          })
          .submitData(payload);
      } else {
        setTimeout(() => {
          if(btn) {
              btn.disabled = false; 
              btn.innerHTML = '<span class="material-icons-round">cloud_upload</span> บันทึกและส่งข้อมูล';
          }
          showToast('บันทึกข้อมูลสำเร็จ (Mock Data)', 'success');
          shootConfetti(); 
          AppState.activeSubmissionId = null;
          let draftKey = `eduDataDraft_${ag}_${formId}`;
          localStorage.removeItem(draftKey);
          if(e.target) e.target.reset();
          if(form) form.style.display = 'none'; 
          document.getElementById('entryFormSelect').value = '';
        }, 1000);
      }
    }

    function parseThaiDateTime(tsStr) {
      if (!tsStr) return new Date(0);
      const parts = tsStr.split(' ');
      const dateParts = (parts[0] || '').split('/');
      const timeParts = (parts[1] || '').split(':');
      
      const day = parseInt(dateParts[0] || '1', 10);
      const month = parseInt(dateParts[1] || '1', 10) - 1;
      const year = parseInt(dateParts[2] || '1970', 10);
      
      const hour = parseInt(timeParts[0] || '0', 10);
      const minute = parseInt(timeParts[1] || '0', 10);
      const second = parseInt(timeParts[2] || '0', 10);
      
      return new Date(year, month, day, hour, minute, second);
    }

    function showRowActionsMenu(e, id, status, json, title, agency, timestamp, formId) {
      e.stopPropagation();
      const rect = e.currentTarget.getBoundingClientRect();
      const menu = document.getElementById('ctxMenu');
      if(!menu) return;
      menu.style.display = 'flex';
      
      let x = rect.left + window.scrollX;
      let y = rect.bottom + window.scrollY;
      
      if (x + 200 > window.innerWidth) x = window.innerWidth - 200;
      if (y + 150 > window.innerHeight) y = window.innerHeight - 150;
      
      menu.style.left = x + 'px';
      menu.style.top = y + 'px';
      
      menu.setAttribute('data-id', id);
      menu.setAttribute('data-json', json);
      menu.setAttribute('data-title', title);
      menu.setAttribute('data-agency', agency);
      menu.setAttribute('data-timestamp', timestamp);
      menu.setAttribute('data-status', status);
      menu.setAttribute('data-formid', formId || '');
      
      const btnApprove = document.getElementById('ctxApprove');
      const btnReject = document.getElementById('ctxReject');
      const divAdmin = document.getElementById('ctxDividerAdmin');
      
      if ((AppState.userRole === 'admin' || AppState.userRole === 'super_admin') && status === 'รออนุมัติ') {

         if(btnReject) btnReject.style.display = 'flex';
         if(divAdmin) divAdmin.style.display = 'block';
      } else {
         if(btnApprove) btnApprove.style.display = 'none';
         if(btnReject) btnReject.style.display = 'none';
         if(divAdmin) divAdmin.style.display = 'none';
      }
    }

    function handleCtxAction(action) {
      const menu = document.getElementById('ctxMenu');
      if(!menu) return;
      const id = menu.getAttribute('data-id');
      const json = menu.getAttribute('data-json');
      const title = menu.getAttribute('data-title');
      const agency = menu.getAttribute('data-agency');
      const timestamp = menu.getAttribute('data-timestamp');
      const status = menu.getAttribute('data-status');
      const formId = menu.getAttribute('data-formid') || '';

      menu.style.display = 'none';

      if(action === 'view') {
        openDataDetails(json, title, agency, formId);
      } else if(action === 'approve') {
        updateStatus(id, 'อนุมัติแล้ว');
      } else if(action === 'reject') {
        promptReject(id);
      } else if(action === 'copy') {
        AppState.activeJsonStr = decodeURIComponent(json);
        copyJsonToClipboard();
      } else if(action === 'print_receipt') {
        printRecordReceipt(json, title, agency, timestamp, status, formId);
      }
    }

    function printRecordReceipt(encodedJson, title, agency, timestamp, status, formId) {
      showToast('กำลังเตรียมเอกสารใบรายงาน PDF...', 'info');
      
      const prAgency = document.getElementById('prAgency');
      const prTitle = document.getElementById('prTitle');
      const prTime = document.getElementById('prTime');
      const prStatus = document.getElementById('prStatus');
      
      if(prAgency) prAgency.innerText = agency;
      if(prTitle) prTitle.innerText = title;
      if(prTime) prTime.innerText = timestamp;
      if(prStatus) prStatus.innerText = status;

      const tb = document.getElementById('prDetailsTable');
      if(tb) {
          tb.innerHTML = '';
          try {
            const data = JSON.parse(decodeURIComponent(encodedJson));
            for(let key in data) {
               if(key === 'report_title') continue;
               const lbl = _getFieldLabel(key, formId) || key;
               tb.innerHTML += `<tr><td style="padding:8px;border-bottom:1px dashed #eee;width:50%;font-size:13px;">${lbl}</td><td style="padding:8px;border-bottom:1px dashed #eee;font-weight:bold;">${data[key]}</td></tr>`;
            }
          } catch(e) {}
      }

      const element = document.getElementById('printReceiptArea');
      if(!element) return;
      element.style.display = 'block';

      const opt = {
        margin:       0.5,
        filename:     `ใบรายงาน_${agency}_${new Date().getTime()}.pdf`,
        image:        { type: 'jpeg', quality: 0.98 },
        html2canvas:  { scale: 2 },
        jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' }
      };

      html2pdf().set(opt).from(element).save().then(() => {
         element.style.display = 'none';
         showToast('ดาวน์โหลดใบรายงาน PDF สำเร็จ', 'success');
      });
    }
    
    function openDataDetails(encodedJson, title, agency, formId) {
      const backdrop = document.getElementById('modalBackdrop');
      if(backdrop) backdrop.classList.add('on');
      document.querySelectorAll('.modal-card').forEach(el => el.style.display = 'none');
      const detailsModal = document.getElementById('detailsModal');
      if(detailsModal) detailsModal.style.display = 'flex';

      const modalTitle = document.getElementById('detailsModalTitle');
      if(modalTitle) modalTitle.innerText = title + ' (' + agencyName(agency) + ')';

      AppState.activeJsonStr = decodeURIComponent(encodedJson);
      const content = document.getElementById('detailsModalContent');
      if(!content) return;

      try {
        const data = JSON.parse(AppState.activeJsonStr);
        if (data.isMultiRow && Array.isArray(data.rows)) {
          let headers = [];
          if (data.rows.length > 0) {
            headers = Object.keys(data.rows[0]);
          }
          
          let thHtml = '<tr><th style="width:50px;text-align:center;">#</th>' + headers.map(h => {
            const label = _getFieldLabel(h, formId) || h;
            return `<th>${label}</th>`;
          }).join('') + '</tr>';
          
          let tbHtml = data.rows.map((row, rIdx) => {
            return `<tr><td style="text-align:center;font-weight:600;color:var(--subtle);">${rIdx + 1}</td>` + headers.map(h => {
              const val = row[h];
              const valDisplay = (val === '' || val === null || val === undefined) ? '<span style="color:var(--muted); font-weight:normal;">—</span>' : `<span>${val}</span>`;
              return `<td>${valDisplay}</td>`;
            }).join('') + '</tr>';
          }).join('');
          
          content.innerHTML = `<div style="overflow-x:auto; border:1px solid var(--border-l); border-radius:12px; margin-bottom:12px;">
            <table class="tbl" style="margin-bottom:0; width:100%; font-size:13px;">
              <thead style="background:var(--s1);">${thHtml}</thead>
              <tbody>${tbHtml}</tbody>
            </table>
          </div>`;
          return;
        }
        let html = '<table class="tbl" style="margin-bottom:0;"><thead><tr><th width="55%">รายการข้อมูล</th><th width="45%">ค่าที่รายงาน</th></tr></thead><tbody>';
        for (let key in data) {
          if (key === 'report_title') continue;
          const label = _getFieldLabel(key, formId) || key;
          const isRawKey = (label === key);
          const labelHtml = isRawKey
            ? `<code style="background:var(--s2);padding:2px 7px;border-radius:4px;font-size:11px;color:var(--muted);">${key}</code>`
            : `<span style="font-size:13px;color:var(--text);">${label}</span>`;
          const val = data[key];
          const valDisplay = (val === '' || val === null || val === undefined) ? '<span style="color:var(--muted);">—</span>' : `<span style="font-weight:700;color:var(--blue-dd);font-size:14px;">${val}</span>`;
          html += `<tr><td>${labelHtml}</td><td>${valDisplay}</td></tr>`;
        }
        html += '</tbody></table>';
        content.innerHTML = html;
      } catch(e) {
        content.innerHTML = `<div class="code-box">${AppState.activeJsonStr}</div>`;
      }
    }
    
    function copyJsonToClipboard() {
      if(!AppState.activeJsonStr) return;
      navigator.clipboard.writeText(AppState.activeJsonStr).then(() => {
        showToast('คัดลอกข้อมูล JSON ลงคลิปบอร์ดแล้ว', 'success');
      }).catch(err => {
        const textArea = document.createElement("textarea");
        textArea.value = AppState.activeJsonStr;
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        try { document.execCommand('copy'); showToast('คัดลอกข้อมูลลงคลิปบอร์ดแล้ว', 'success'); } 
        catch (err) { showToast('ไม่สามารถคัดลอกได้', 'error'); }
        document.body.removeChild(textArea);
      });
    }

      var ta     = document.getElementById('rm-reason');
      var err    = document.getElementById('rm-error');
      var reason = (ta ? ta.value : '').trim();
      if (!reason) {
        if (err) { err.style.display = 'block'; err.innerText = 'กรุณาระบุเหตุผลก่อนส่งกลับ'; }

    function exportToCSV() {
      var rows = AppState.currentDataList || [];
      if (rows.length === 0) { showToast('ไม่มีข้อมูลสำหรับ Export', 'error'); return; }
      if (AppState.userRole === 'agency') {
        rows = rows.filter(function(r){ return r.agencyId === AppState.userAgencyId; });
      }

      // รวม field keys ทั้งหมดจากทุก row (flatten JSON)
      var allKeys = new Set();
      rows.forEach(function(row) {
        try {
          var d = typeof row.details === 'string' ? JSON.parse(row.details) : (row.details || {});
          Object.keys(d).forEach(function(k){ allKeys.add(k); });
        } catch(e) {}
      });
      var dataKeys = Array.from(allKeys).sort();

      // header row
      var fixedHeaders = ['เวลาที่บันทึก','รหัสสังกัด','ชื่อสังกัด','หัวข้อรายงาน','สถานะ','หมายเหตุ Admin'];
      var csvRows = [fixedHeaders.concat(dataKeys).join(',')];

      rows.forEach(function(row) {
        var d = {};
        try { d = typeof row.details === 'string' ? JSON.parse(row.details) : (row.details || {}); } catch(e) {}
        var fixed = [
          row.timestamp || '',
          row.agencyId  || '',
          (row.agencyName || agencyName(row.agencyId) || row.agencyId || '').replace(/,/g,' '),
          (row.reportTitle || row.title || '').replace(/,/g,' '),
          row.status   || '',
          (row.adminComment || '').replace(/,/g,' ')
        ];
        var dataVals = dataKeys.map(function(k){ return (d[k] !== undefined && d[k] !== null) ? String(d[k]).replace(/,/g,' ') : ''; });
        csvRows.push('"' + fixed.join('","') + '","' + dataVals.join('","') + '"');
      });

      var csv  = csvRows.join('\n');
      
      var blob = new Blob(['﻿' + csv], { type:'text/csv;charset=utf-8;' });
      var url  = URL.createObjectURL(blob);
      var a    = document.createElement('a');
      a.href = url;
      a.download = 'EduData_Export_' + new Date().toISOString().slice(0,10) + '.csv';
      a.click();
      URL.revokeObjectURL(url);
      showToast('Export CSV สำเร็จ — ' + rows.length + ' รายการ, ' + dataKeys.length + ' คอลัมน์ข้อมูล', 'success');
    }

    // ── ข้อ 5: YoY Chart ─────────────────────────────────────────
    var eChartYoY = null;

    function renderYoYChart() {
      var chartEl = document.getElementById('chartYoY');
      var emptyEl = document.getElementById('yoy-empty');
      if (!chartEl) return;

      // ใช้ข้อมูลแคชหากมีอยู่แล้วเพื่อความเร็ว
      if (AppState.yoyData) {
        drawYoYChart(AppState.yoyData);
        return;
      }

      if (typeof google !== 'undefined' && google.script) {
        google.script.run
          .withSuccessHandler(function(d) { 
            AppState.yoyData = d;
            drawYoYChart(d); 
          })
          .withFailureHandler(function() { if(emptyEl) emptyEl.style.display='block'; })
          .getYoYData();
      } else {
        // Mock YoY data
        AppState.yoyData = {
          years:    ['2567','2568','2569'],
          students: [82450, 81200, 80100],
          schools:  [120,   120,   120],
          teachers: [4120,  4050,  3980]
        };
        drawYoYChart(AppState.yoyData);
      }
    }

    function drawYoYChart(d) {
      var chartEl = document.getElementById('chartYoY');
      var emptyEl = document.getElementById('yoy-empty');
      if (!chartEl || !d || !d.years || d.years.length === 0) {
        if (emptyEl) { emptyEl.style.display='block'; chartEl.style.display='none'; }
        return;
      }
      if (emptyEl) emptyEl.style.display = 'none';
      chartEl.style.display = 'block';

      var metric = document.getElementById('yoyMetric')?.value || 'students';
      var vals   = [...(d[metric] || d.students || [])];
      var label  = { students:'ผู้เรียน (คน)', schools:'สถานศึกษา (แห่ง)', teachers:'ครู (คน)' }[metric];

      var years = [...d.years];

      // แทรกรวมพยากรณ์ AI เข้าไปด้วยถ้ามี
      if (AppState.forecastData) {
        AppState.forecastData.forEach(function(item) {
          years.push(item.year);
          var forecastVal = 0;
          if (metric === 'students') forecastVal = item.student_total;
          else if (metric === 'teachers') forecastVal = item.teacher_total;
          else if (metric === 'schools') forecastVal = item.school_total;
          vals.push(forecastVal);
        });
      }

      // คำนวณ % เปลี่ยนแปลง YoY
      var changeData = vals.map(function(v,i) {
        if (i === 0) return 0;
        return parseFloat(((v - vals[i-1]) / vals[i-1] * 100).toFixed(1));
      });

      // จัดข้อมูลชุดหลัก (และชุดโปร่งแสงสำหรับทำนายอนาคต)
      var seriesData = [];
      for (var i = 0; i < vals.length; i++) {
        var isForecast = (i >= d.years.length);
        if (isForecast) {
          seriesData.push({
            value: vals[i],
            itemStyle: {
              color: 'rgba(26, 115, 232, 0.4)',
              borderColor: '#1a73e8',
              borderType: 'dashed',
              borderWidth: 1.5,
              borderRadius: [4,4,0,0]
            }
          });
        } else {
          seriesData.push({
            value: vals[i]
          });
        }
      }

      // จัดชุดข้อมูลจำลองนโยบาย (Simulated Series)
      var simSeriesData = [];
      if (AppState.simulationMode) {
        var simStudentPct = parseFloat(document.getElementById('simStudent')?.value || 0);
        var simTeacherOffset = parseInt(document.getElementById('simTeacher')?.value || 0);
        
        for (var i = 0; i < vals.length; i++) {
          var isForecast = (i >= d.years.length);
          var val = vals[i];
          
          // ปรับปรุงค่าในจำลองนโยบายเฉพาะปีล่าสุดและปีพยากรณ์
          if (i === d.years.length - 1 || isForecast) {
            if (metric === 'students') {
              val = Math.round(val * (1 + simStudentPct / 100));
            } else if (metric === 'teachers') {
              val = val + simTeacherOffset;
            }
          }
          
          if (isForecast) {
            simSeriesData.push({
              value: val,
              itemStyle: {
                color: 'rgba(41, 121, 255, 0.4)',
                borderColor: '#2979ff',
                borderType: 'dashed',
                borderWidth: 1.5,
                borderRadius: [4,4,0,0]
              }
            });
          } else {
            simSeriesData.push({
              value: val
            });
          }
        }
      }

      if (!eChartYoY) eChartYoY = echarts.init(chartEl);
      var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      var textColor = isDark ? '#bdc1c6' : '#5f6368';

      var legendData = [label];
      if (AppState.simulationMode) legendData.push(label + ' (จำลอง)');
      legendData.push('เปลี่ยนแปลง (%)');

      var seriesOptions = [
        { name:label, type:'bar', data:seriesData, yAxisIndex:0, barMaxWidth:30,
          itemStyle:{ color:'#1a73e8', borderRadius:[4,4,0,0] },
          label:{ show:true, position:'top', color:textColor, fontSize:10, formatter:function(p){ return p.value.toLocaleString(); } } }
      ];

      if (AppState.simulationMode) {
        seriesOptions.push({
          name: label + ' (จำลอง)',
          type: 'bar',
          data: simSeriesData,
          yAxisIndex: 0,
          barMaxWidth: 30,
          itemStyle: { color: '#2979ff', borderRadius:[4,4,0,0] },
          label: { show:true, position:'top', color:'#2979ff', fontSize:10, formatter:function(p){ return p.value.toLocaleString(); } }
        });
      }

      seriesOptions.push({
        name:'เปลี่ยนแปลง (%)', type:'line', data:changeData, yAxisIndex:1,
        lineStyle:{ color:'#34a853', width:2 }, symbol:'circle', symbolSize:6,
        itemStyle:{ color:'#34a853' },
        label:{ show:true, position:'top', color:'#34a853', fontSize:10, formatter:function(p){ return (p.value>0?'+':'')+p.value+'%'; } }
      });

      eChartYoY.setOption({
        backgroundColor: 'transparent',
        tooltip: { trigger:'axis', axisPointer:{ type:'shadow' } },
        legend: { data:legendData, textStyle:{ color:textColor, fontSize:11 }, bottom:0 },
        grid: { top:15, bottom:32, left:60, right:60 },
        xAxis: { type:'category', data:years, axisLabel:{ color:textColor } },
        yAxis: [
          { type:'value', name:label, nameTextStyle:{color:textColor,fontSize:10}, axisLabel:{color:textColor,formatter:function(v){return v.toLocaleString();}} },
          { type:'value', name:'%', axisLabel:{ color:textColor, formatter:'{value}%' }, splitLine:{show:false} }
        ],
        series: seriesOptions
      }, true);
    }

    // ── ฟังก์ชันควบคุมระบบจำลองนโยบาย (Policy Simulator Helpers) ──
    AppState.simulationMode = false;

    function toggleSimulationMode(el) {
      AppState.simulationMode = el.checked;
      var panel = document.getElementById('simSlidersPanel');
      if (panel) panel.style.display = el.checked ? 'block' : 'none';
      
      if (el.checked) {
        updateSimulationValues();
      } else {

    function updateSimulationValues() {
      if (!AppState.simulationMode) return;

      var simStudent = parseFloat(document.getElementById('simStudent')?.value || 0);
      var simTeacher = parseInt(document.getElementById('simTeacher')?.value || 0);
      var simBudget = parseFloat(document.getElementById('simBudget')?.value || 0);

      if (document.getElementById('valSimStudent')) document.getElementById('valSimStudent').innerText = (simStudent >= 0 ? '+' : '') + simStudent + '%';
      if (document.getElementById('valSimTeacher')) document.getElementById('valSimTeacher').innerText = (simTeacher >= 0 ? '+' : '') + simTeacher + ' อัตรา';
      if (document.getElementById('valSimBudget')) document.getElementById('valSimBudget').innerText = (simBudget >= 0 ? '+' : '') + simBudget + '%';

      // ดึงสถิติจริงจากแดชบอร์ด
      var rawStudents = AppState.currentDashboardData ? AppState.currentDashboardData.totalStudents : 80100;
      var rawTeachers = AppState.currentDashboardData ? AppState.currentDashboardData.totalTeachers : 3980;

      // คำนวณผลลัพธ์จำลอง
      var simStudents = Math.round(rawStudents * (1 + simStudent / 100));
      var simTeachers = rawTeachers + simTeacher;

      // ครู 1 คน ต่อนักเรียนกี่คน (Student to Teacher Ratio)
      var ratio = (simStudents / (simTeachers || 1)).toFixed(1);
      var ratioLabel = document.getElementById('lblSimRatio');
      if (ratioLabel) {
        ratioLabel.innerText = 'ครู 1 คน ต่อนักเรียน ' + ratio + ' คน';
        if (ratio > 25) {
          ratioLabel.style.color = '#c62828'; // ขาดแคลนวิกฤต
        } else if (ratio < 15) {
          ratioLabel.style.color = '#1565c0'; // ครูล้น/อัตราส่วนน้อย
        } else {
          ratioLabel.style.color = '#2e7d32'; // ปกติ
        }
      }

      // กระตุ้นแอนิเมชันสั่นไหวของตัวเลขสถิติบน Dashboard
      ['dashStudents', 'dashTeachers'].forEach(id => {
        var el = document.getElementById(id);
        if (el) {
          el.classList.remove('pulse-highlight');
          void el.offsetWidth; // Trigger reflow
          el.classList.add('pulse-highlight');
        }
      });

      // ปรับปรุงกราฟ YoY
      if (AppState.yoyData) {
        drawYoYChart(AppState.yoyData);
      }
    }

    function resetSimulation() {
      if (document.getElementById('simStudent')) document.getElementById('simStudent').value = 0;
      if (document.getElementById('simTeacher')) document.getElementById('simTeacher').value = 0;
      if (document.getElementById('simBudget')) document.getElementById('simBudget').value = 0;

      updateSimulationValues();
      
      if (!AppState.simulationMode) {
        // วาดกราฟใหม่ในโหมดปกติ
        if (AppState.yoyData) {
          drawYoYChart(AppState.yoyData);
        }
      }
    }

    function formatBulletPoints(text) {
      if (!text) return '';
      // แปลงพวกสัญลักษณ์ bullet points ที่ AI อาจตอบกลับมาให้กลายเป็นรายการ HTML
      var lines = text.split('\n');
      var listItems = [];
      lines.forEach(function(l) {
        var clean = l.trim();
        if (clean.indexOf('*') === 0 || clean.indexOf('-') === 0) {
          clean = clean.substring(1).trim();
          listItems.push('<li>' + clean + '</li>');
        } else if (clean.match(/^\d+\./)) {
          clean = clean.replace(/^\d+\./, '').trim();
          listItems.push('<li>' + clean + '</li>');
        } else if (clean.length > 0) {
          listItems.push('<p style="margin-bottom:6px;">' + clean + '</p>');
        }
      });
      if (listItems.length > 0) {
        return '<ul style="margin-left:20px; margin-top:8px;">' + listItems.join('') + '</ul>';
      }
      return text;
    }


    // ── ข้อ 6: Session Log ───────────────────────────────────────
    let _sessionLogsCache = [];

    function openSessionLogModal() {
      const backdrop = document.getElementById('modalBackdrop');
      const modal    = document.getElementById('sessionLogModal');
      if (!backdrop || !modal) return;
      document.querySelectorAll('.modal-card').forEach(function(el){ el.style.display = 'none'; });
      backdrop.classList.add('on');
      modal.style.display = 'flex';

      // Reset search filter input
      const searchInput = document.getElementById('sessionLogSearchInput');
      if (searchInput) searchInput.value = '';

      loadSessionLog();
    }

    function filterSessionLogs() {
      const searchInput = document.getElementById('sessionLogSearchInput');
      const filterText = searchInput ? searchInput.value.toLowerCase().trim() : '';

      const filtered = _sessionLogsCache.filter(function(r) {
        const timestamp = (r.timestamp || '').toLowerCase();
        const username = (r.username || '').toLowerCase();
        const role = (r.role || '').toLowerCase();
        const agencyName = (r.agencyName || '').toLowerCase();
        const action = (r.action || '').toLowerCase();
        const detail = (r.detail || '').toLowerCase();
        return timestamp.includes(filterText) || username.includes(filterText) || role.includes(filterText) || agencyName.includes(filterText) || action.includes(filterText) || detail.includes(filterText);
      });

      renderSessionLog(filtered, filterText);
    }

    function loadSessionLog() {
      const loader = document.getElementById('sessionLogLoader');
      const table  = document.getElementById('sessionLogTable');
      const tbody  = document.getElementById('sessionLogBody');
      if (!tbody) return;
      if (loader) loader.style.display = 'block';
      if (table)  table.style.display  = 'none';

      if (typeof google !== 'undefined' && google.script) {
        google.script.run
          .withSuccessHandler(function(rows) {
            _sessionLogsCache = rows || [];
            renderSessionLog(rows);
          })
          .withFailureHandler(function() { showToast('โหลด Session Log ไม่สำเร็จ','error'); })
          .getSessionLog({ userRole: AppState.userRole, sessionToken: AppState.sessionToken });
      } else {
        // Mock session data
        const mockRows = [
          { timestamp:'17/04/2569 16:10:00', username:'wichai', role:'super_admin', agencyName:'ศธจ.สกลนคร', action:'LOGIN',  duration:'00:45:12', detail:'เข้าระบบสำเร็จ' },
          { timestamp:'17/04/2569 15:20:00', username:'somchai', role:'admin', agencyName:'สพป.เขต 1', action:'LOGIN',  duration:'00:30:05', detail:'เข้าระบบสำเร็จ' },
          { timestamp:'17/04/2569 14:00:00', username:'malee', role:'agency', agencyName:'สพม.สกลนคร', action:'LOGOUT', duration:'01:12:33', detail:'ออกระบบ' }
        ];
        _sessionLogsCache = mockRows;
        renderSessionLog(mockRows);
      }
    }

    function renderSessionLog(rows, filterText = '') {
      const loader = document.getElementById('sessionLogLoader');
      const table  = document.getElementById('sessionLogTable');
      const tbody  = document.getElementById('sessionLogBody');
      if (!tbody) return;
      if (loader) loader.style.display = 'none';
      if (table)  table.style.display  = 'table';

      if (!rows || rows.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:32px;color:var(--muted);font-size:13px;">ยังไม่มีข้อมูล Session Log</td></tr>';
        return;
      }

      tbody.innerHTML = rows.map(function(r) {
        // Action styling with low opacity backgrounds and proper icons
        let actBg = 'var(--s2)';
        let actFg = 'var(--text-2)';
        let actIcon = 'settings';
        
        if (r.action === 'LOGIN') { actBg = 'var(--green-ll)'; actFg = 'var(--green)'; actIcon = 'login'; }
        else if (r.action === 'LOGOUT') { actBg = 'var(--s2)'; actFg = 'var(--muted)'; actIcon = 'logout'; }
        else if (r.action === 'LOGIN_FAILED') { actBg = 'var(--red-ll)'; actFg = 'var(--red)'; actIcon = 'block'; }

        const actionBadge = `
          <span style="display:inline-flex; align-items:center; gap:5px; background:${actBg}; color:${actFg}; padding:3px 8px; border-radius:6px; font-size:11px; font-weight:700; text-transform:uppercase;">
            <span class="material-icons-round" style="font-size:13.5px; color:inherit;">${actIcon}</span>
            <span>${r.action || '-'}</span>
          </span>
        `;

        // Role Badge Styling
        const roleColors = { super_admin:'#d93025', admin:'var(--blue)', agency:'var(--green)' };
        const roleLabels = { super_admin:'Super Admin', admin:'Admin', agency:'Agency' };
        const rColor = roleColors[r.role] || 'var(--text-2)';
        const rLabel = roleLabels[r.role] || r.role;
        const roleBadge = `<span class="badge" style="background:${rColor}12; color:${rColor}; border-color:${rColor}40; font-weight:700;">${rLabel}</span>`;

        // Monospace duration styling
        const durationDisplay = r.duration ? `
          <div style="display:inline-flex; align-items:center; gap:4px; font-family:monospace; color:var(--text-2); font-size:12px; font-weight:600; background:var(--s1); padding:3px 7px; border-radius:6px; border:1px solid var(--border);">
            <span class="material-icons-round" style="font-size:13px; color:var(--muted);">schedule</span>
            <span>${r.duration}</span>
          </div>
        ` : '-';

        return `
          <tr style="transition:background var(--t);">
            <td style="padding:12px 16px; border-bottom:1px solid var(--border-l); vertical-align:middle;">${_formatAuditTimestamp(r.timestamp)}</td>
            <td style="padding:12px 16px; border-bottom:1px solid var(--border-l); vertical-align:middle; font-weight:700; color:var(--text); font-size:13px;">${r.username || '-'}</td>
            <td style="padding:12px 16px; border-bottom:1px solid var(--border-l); vertical-align:middle;">${roleBadge}</td>
            <td style="padding:12px 16px; border-bottom:1px solid var(--border-l); vertical-align:middle; font-weight:600; color:var(--text-2); font-size:13px;">${r.agencyName || '-'}</td>
            <td style="padding:12px 16px; border-bottom:1px solid var(--border-l); vertical-align:middle;">${actionBadge}</td>
            <td style="padding:12px 16px; border-bottom:1px solid var(--border-l); vertical-align:middle;">${durationDisplay}</td>
            <td style="padding:12px 16px; border-bottom:1px solid var(--border-l); vertical-align:middle; font-size:12px; color:var(--muted);">${r.detail || '-'}</td>
          </tr>
        `;
      }).join('');

      // Update count display
      const countDisplay = document.getElementById('sessionLogCountDisplay');
      if (countDisplay) {
        if (filterText) {
          countDisplay.innerText = `พบ ${rows.length} จาก ${_sessionLogsCache.length} เซสชัน`;
        } else {
          countDisplay.innerText = `ทั้งหมด ${rows.length} เซสชันล่าสุด`;
        }
      }
    }

    function tplToggleAgency(k) {
      if (_tplAgSelected.includes('ALL')) {
        _tplAgSelected = [k];
      } else {
        var idx = _tplAgSelected.indexOf(k);
        if (idx >= 0) {
          _tplAgSelected.splice(idx, 1);
          if (_tplAgSelected.length === 0) _tplAgSelected = ['ALL'];
        } else {
          _tplAgSelected.push(k);
          var agKeys = Object.keys(AGENCY_MAP || {});
          if (_tplAgSelected.length >= agKeys.length) _tplAgSelected = ['ALL'];
        }
      }
      _tplRenderAgencyPicker();
    }

    // ── Deadline: แสดงบนฟอร์มกรอกข้อมูล ─────────────────────────
    function showDeadlineBanner(deadline) {
      var banner = document.getElementById('deadlineBanner');
      if (!deadline) { if (banner) banner.style.display = 'none'; return; }
      var dlDate  = new Date(deadline);
      var today   = new Date(); today.setHours(0,0,0,0);
      var diffDay = Math.ceil((dlDate - today) / 86400000);
      var color   = diffDay < 0 ? 'var(--red-ll)' : diffDay <= 3 ? '#fffde7' : 'var(--blue-ll)';
      var border  = diffDay < 0 ? 'var(--red-l)'  : diffDay <= 3 ? '#f9a825' : 'var(--blue-l)';
      var icon    = diffDay < 0 ? '🔴' : diffDay <= 3 ? '⚠️' : '📅';
      var msg     = diffDay < 0  ? 'เกินกำหนดส่งแล้ว ' + Math.abs(diffDay) + ' วัน!'
                  : diffDay === 0 ? 'หมดเขตส่งวันนี้!'
                  : 'หมดเขตส่งใน ' + diffDay + ' วัน (' + deadline + ')';
      if (!banner) {
        banner = document.createElement('div');
        banner.id = 'deadlineBanner';
        var formCard = document.querySelector('#view-entry .card');
        if (formCard) formCard.insertBefore(banner, formCard.firstChild);
      }
      banner.style.cssText = 'padding:10px 16px;border-radius:8px;border:1px solid ' + border
        + ';background:' + color + ';font-size:13px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px;';
      banner.innerHTML = icon + ' กำหนดส่ง: ' + msg;
    }

    // ── Import CSV/Excel ──────────────────────────────────────────
    function importDataFile(event) {
      var file = event.target.files[0];
      if (!file) return;
      var ext = file.name.split('.').pop().toLowerCase();

      // ตรวจว่ามีฟอร์มและ field อยู่แล้ว
      var formId = document.getElementById('entryFormSelect')?.value;
      if (!formId) { showToast('กรุณาเลือกแบบฟอร์มก่อน แล้วค่อย Import', 'warning'); event.target.value=''; return; }

      if (ext === 'csv') {
        var reader = new FileReader();
        reader.onload = function(e) { parseAndFillCSV(e.target.result); };
        reader.readAsText(file, 'UTF-8');
      } else if (ext === 'xlsx' || ext === 'xls') {
        // ใช้ SheetJS
        if (typeof XLSX === 'undefined') {
          var script = document.createElement('script');
          script.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
          script.onload = function() { readExcelFile(file); };
          document.head.appendChild(script);
        } else { readExcelFile(file); }
      }
      event.target.value = '';
    }

    function readExcelFile(file) {
      var reader = new FileReader();
      reader.onload = function(e) {
        var wb   = XLSX.read(e.target.result, { type: 'array' });
        var ws   = wb.Sheets[wb.SheetNames[0]];
        var csv  = XLSX.utils.sheet_to_csv(ws);
        parseAndFillCSV(csv);
      };
      reader.readAsArrayBuffer(file);
    }

    function parseAndFillCSV(csvText) {
      if (!csvText || !csvText.trim()) { showToast('ไฟล์ไม่มีข้อมูล', 'error'); return; }
      var lines = csvText.split('\n').map(function(l){ return l.replace(/\r$/,''); }).filter(function(l){ return l.trim(); });
      if (lines.length < 2) { showToast('ไฟล์ไม่มีข้อมูล', 'error'); return; }

      var headers = lines[0].split(',').map(function(h){ return h.trim().replace(/^"|"$/g,'').toLowerCase(); });
      var allRows = [];
      for (var ri = 1; ri < lines.length; ri++) {
        if (!lines[ri].trim()) continue;
        var vals = lines[ri].split(',').map(function(v){ return v.trim().replace(/^"|"$/g,''); });
        var row  = {};
        headers.forEach(function(h,i){ row[h] = vals[i] || ''; });
        allRows.push(row);
      }
      if (allRows.length === 0) { showToast('ไม่มีข้อมูลในไฟล์', 'error'); return; }

      var inputs = document.querySelectorAll('#entryFormFields input[name], #entryFormFields select[name], #entryFormFields textarea[name]');
      var fieldConfigs = [];
      inputs.forEach(function(el) {
        if (el.name) fieldConfigs.push({ name: el.name, type: el.type || el.tagName.toLowerCase(), required: el.required });
      });

      var validRows = [], invalidRows = [];
      allRows.forEach(function(row, idx) {
        var errors = validateImportRow(row, fieldConfigs);
        if (errors.length === 0) validRows.push({ row: row, idx: idx+1 });
        else invalidRows.push({ row: row, idx: idx+1, errors: errors });
      });

      showImportPreview(validRows, invalidRows, fieldConfigs, inputs);
    }

    function validateImportRow(row, fieldConfigs) {
      var errors = [];
      fieldConfigs.forEach(function(f) {
        var val = (row[f.name] || '').trim();
        if (f.required && !val) { errors.push(f.name + ': จำเป็นต้องมีข้อมูล'); return; }
        if (!val) return;
        if (f.type === 'number') {
          if (isNaN(Number(val))) errors.push(f.name + ': ต้องเป็นตัวเลข (พบ: "' + val + '")');
          else if (Number(val) < 0) errors.push(f.name + ': ต้องไม่ติดลบ');
        }
        if (f.type === 'date') {
          if (!val.match(/^\d{4}-\d{2}-\d{2}$/) && !val.match(/^\d{1,2}\/\d{1,2}\/\d{4}$/))
            errors.push(f.name + ': รูปแบบวันที่ไม่ถูกต้อง');
        }
      });
      return errors;
    }

      Swal.fire({

    function downloadImportTemplate() {
      var inputs  = document.querySelectorAll('#entryFormContainer input[name], #entryFormContainer select[name], #entryFormContainer textarea[name]');
      var headers = [];
      inputs.forEach(function(el) { 
        if (el.name && headers.indexOf(el.name) === -1) { 
          headers.push(el.name); 
        } 
      });
      if (headers.length === 0) { showToast('กรุณาเลือกแบบฟอร์มก่อน', 'warning'); return; }
      
      var formSelect = document.getElementById('entryFormSelect');
      var formName = formSelect ? formSelect.options[formSelect.selectedIndex].text : 'template';
      formName = formName.replace(/\s+/g, '_').replace(/[^\w฀-๿]/g, ''); // Clean filename to avoid bad characters
      
      var csv  = headers.join(',') + '\n' + headers.map(function(){ return ''; }).join(',');
      var blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
      var url  = URL.createObjectURL(blob);
      var a    = document.createElement('a');
      a.href = url;
      a.download = 'Template_' + formName + '.csv';
      a.click();
      URL.revokeObjectURL(url);
      showToast('ดาวน์โหลดไฟล์แม่แบบ CSV แล้ว — กรอกข้อมูลแถวที่ 2 และ Import เข้ามาได้เลย', 'success');
    }

            + 'display:flex;align-items:center;justify-content:center;color:var(--blue);font-size:20px;font-weight:300;flex-shrink:0;line-height:1;">+</div>'
          + '<div style="flex:1;">'

          + '</div>'
        + '</div>';
      }

      area.innerHTML = html;

    // ── Toggle field selection ────────────────────────────────────
    function fbToggleField(name, cat) {
      const allItems = (FB_CATALOG[cat] || []).concat(fbCustomItems[cat] || []);
      const def = allItems.find(f => f.name === name);
      if (!def) return;

      const idx = selectedFields.findIndex(f => f.name === name);
      if (idx >= 0) {
        selectedFields.splice(idx, 1);
      } else {
        selectedFields.push({ ...def });
      }

      fbRenderCheckboxes(cat);
      fbRenderPreview();
    }

    var _fbAddCat = 'main';  // หมวดที่กำลังเพิ่ม

    function fbOpenAddCustom(cat) {
      _fbAddCat = cat;
      _fbSelectedType = 'number';
      var catLabel = { main:'ข้อมูลหลัก', building:'อาคาร', budget:'งบประมาณ', misc:'ข้อมูลอื่นๆ' }[cat] || cat;

      // ตั้งค่า title

      var hint = document.getElementById('ca-hint');

    function fbClearModalError() {

      if (err) { err.style.display = 'none'; err.innerText = ''; }
    }

    function fbShowModalError(msg) {
      var err = document.getElementById('ca-error');
      if (err) { err.style.display = 'block'; err.innerText = msg; }
    }

    function fbGuessIcon(type, label) {
      if (type === 'date')     return 'event';
      if (type === 'textarea') return 'notes';
      if (type === 'select')   return 'list';
      if (type === 'text')     return 'short_text';
      if (type === 'checkbox') return 'check_box';
      if (type === 'radio')    return 'radio_button_checked';
      if (type === 'section')  return 'view_headline';
      var l = (label || '').toLowerCase();
      if (l.indexOf('ห้อง') >= 0)                          return 'meeting_room';
      if (l.indexOf('อาคาร') >= 0 || l.indexOf('สิ่งปลูกสร้าง') >= 0) return 'apartment';
      if (l.indexOf('คน') >= 0 || l.indexOf('นักเรียน') >= 0 || l.indexOf('ครู') >= 0) return 'person';
      if (l.indexOf('โรงเรียน') >= 0 || l.indexOf('สถานศึกษา') >= 0) return 'school';
      if (l.indexOf('บาท') >= 0 || l.indexOf('งบ') >= 0)  return 'payments';
      if (l.indexOf('คอม') >= 0 || l.indexOf('อินเตอร์') >= 0 || l.indexOf('เน็ต') >= 0) return 'computer';
      return 'tag';
    }

    function fbConfirmAddCustom() {
      var lbl   = (document.getElementById('ca-label')?.value || '').trim();
      var hint  = (document.getElementById('ca-hint')?.value  || '').trim();
      var type  = _fbSelectedType || 'number';
      var opts  = (document.getElementById('ca-opts')?.value  || '').trim();
      var cat   = _fbAddCat;
      var minVal = (document.getElementById('ca-min')?.value || '').trim();
      var maxVal = (document.getElementById('ca-max')?.value || '').trim();

      // validate
      if (!lbl) { fbShowModalError('กรุณากรอกชื่อที่แสดง'); document.getElementById('ca-label')?.focus(); return; }
      if ((type === 'select' || type === 'radio') && !opts) { fbShowModalError('กรุณากรอกตัวเลือกอย่างน้อย 2 รายการ คั่นด้วย  |'); document.getElementById('ca-opts')?.focus(); return; }

      // อ่านค่า dashboard toggle (เฉพาะ number)
      var isDash = (type === 'number' && _fbDashEnabled);

      // สร้าง key อัตโนมัติ
      var name = 'custom_' + cat.charAt(0) + '_' + Date.now().toString(36);

      var newItem = {
        name:       name,
        label:      lbl,
        icon:       fbGuessIcon(type, lbl),
        dash:       isDash,
        dashLabel:  isDash ? lbl : undefined,
        type:       type,
        hint:       hint,
        opts:       opts || undefined,
        min:        (type === 'number' && minVal !== '') ? parseFloat(minVal) : undefined,
        max:        (type === 'number' && maxVal !== '') ? parseFloat(maxVal) : undefined,
        required:   type === 'section' ? false : true,
        isCustom:   true
      };

      if (!fbCustomItems[cat]) fbCustomItems[cat] = [];
      fbCustomItems[cat].push(newItem);
      fbSaveCustomItems();

      fbCloseAddModal();
      fbRenderCheckboxes(cat);

      var catLabel = { main:'ข้อมูลหลัก', building:'อาคาร', budget:'งบประมาณ', misc:'ข้อมูลอื่นๆ' }[cat] || cat;
      showToast('เพิ่ม "' + lbl + '" ในหมวด ' + catLabel + ' แล้ว', 'success');
    }

    // ปิด modal ด้วย Escape
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        var overlay = document.getElementById('fb-add-modal-overlay');

      }
    });

    // ── fbToggleCaOpts (legacy — ไม่ใช้แล้ว แต่เก็บไว้ป้องกัน error) ──────
    function fbToggleCaOpts() {}

        function fbDeleteCustomItem(name, cat) {
      if (!fbCustomItems[cat]) return;
      fbCustomItems[cat] = fbCustomItems[cat].filter(f => f.name !== name);
      fbSaveCustomItems();
      // ลบออกจาก selectedFields ด้วย ถ้าเลือกไว้
      selectedFields = selectedFields.filter(f => f.name !== name);
      fbRenderCheckboxes(cat);
      fbRenderPreview();
      showToast('ลบรายการออกแล้ว', 'info');
    }

    // ── Render preview chips ──────────────────────────────────────
    function fbRenderPreview() {
      const area  = document.getElementById('fb-preview-area');
      const count = document.getElementById('fb-selected-count');
      if (!area) return;

      if (selectedFields.length === 0) {
        area.innerHTML = '<span style="color:var(--muted);font-size:13px;align-self:center;">คลิกช่องข้อมูลด้านบนเพื่อเพิ่ม...</span>';
        if (count) count.innerText = 'ยังไม่ได้เลือก';
        return;
      }

      area.innerHTML = selectedFields.map(f => {
        if (f.type === 'section') {
          return '<span class="fb-chip" style="background:var(--blue-ll);color:var(--blue);border-color:var(--blue-l);font-weight:700;width:100%;justify-content:flex-start;gap:6px;">'
            + '<span class="material-icons-round" style="font-size:13px;">view_headline</span>'
            + '── ' + f.label + ' ──'
            + '<button onclick="fbRemoveField(\'' + f.name + '\')" title="นำออก" style="margin-left:auto;">×</button>'
          + '</span>';
        }
        const isRequired = f.required !== false;
        const cls = f.dash ? 'fb-chip dash' : 'fb-chip';
        const reqBtn = '<button onclick="fbToggleRequired(\'' + f.name + '\')" title="' + (isRequired ? 'คลิกเพื่อทำให้ไม่บังคับ' : 'คลิกเพื่อทำให้บังคับกรอก') + '" style="padding:0 3px;font-size:12px;color:' + (isRequired ? 'var(--red)' : 'var(--muted)') + ';font-weight:700;">' + (isRequired ? '*' : '○') + '</button>';
        return '<span class="' + cls + '">'
          + '<span class="material-icons-round" style="font-size:13px;">' + (f.icon||'tag') + '</span>'
          + f.label
          + reqBtn
          + '<button onclick="fbRemoveField(\'' + f.name + '\')" title="นำออก">×</button>'
        + '</span>';
      }).join('');

      const dashCount = selectedFields.filter(f => f.dash).length;
      const dataCount = selectedFields.filter(f => f.type !== 'section').length;
      if (count) {
        count.innerText = dataCount + ' ฟิลด์ข้อมูล'
          + (selectedFields.length > dataCount ? ' + ' + (selectedFields.length - dataCount) + ' หัวข้อ' : '')
          + (dashCount > 0 ? ' (📊 Dashboard ' + dashCount + ' รายการ)' : '');
      }
    }

    function fbToggleRequired(name) {
      const f = selectedFields.find(x => x.name === name);
      if (!f || f.type === 'section') return;
      f.required = f.required === false ? true : false;
      fbRenderPreview();
    }

    function fbRemoveField(name) {
      const idx = selectedFields.findIndex(f => f.name === name);
      if (idx >= 0) selectedFields.splice(idx, 1);
      fbRenderCheckboxes(catalogFilter);
      fbRenderPreview();
    }

    // ── Save ──────────────────────────────────────────────────────
    function saveFormBuilder() {
      const formName = document.getElementById('builderFormName').value.trim();
      const agencyId = fbGetAgencyValue();
      const formId   = document.getElementById('builderFormId').value.trim() || 'FORM_' + Date.now();
      const errBox   = document.getElementById('fb-save-errors');

      // Validate
      const errors = [];
      if (!formName) errors.push('กรุณาตั้งชื่อแบบฟอร์ม (ขั้นตอนที่ 1)');
      if (selectedFields.length === 0) errors.push('กรุณาเลือกข้อมูลที่ต้องการเก็บอย่างน้อย 1 รายการ (ขั้นตอนที่ 2)');

      if (errors.length > 0) {
        if (errBox) { errBox.style.display = 'block'; errBox.innerHTML = errors.map(e => '❌ ' + e).join('<br />'); }
        return;
      }
      if (errBox) errBox.style.display = 'none';

      // Build formConfig
      const formConfig = [
        { name:'report_title', label:'หัวข้อการรายงาน', type:'text', required:true }
      ].concat(selectedFields.map(f => {
        const fc = { name: f.name, label: f.label, type: f.type, required: f.type === 'section' ? false : (f.required !== false) };
        if (f.opts)               fc.opts = f.opts;
        if (f.min !== undefined)  fc.min  = f.min;
        if (f.max !== undefined)  fc.max  = f.max;
        return fc;
      }));

      const btn = document.getElementById('btnSaveForm');
      if (btn) { btn.disabled = true; btn.innerHTML = 'กำลังบันทึก...'; }

      const deadline = (document.getElementById('builderDeadline')?.value || '').trim();
      const payload = { formId, formName, agencyId, formConfig, deadline, userRole: AppState.userRole, sessionToken: AppState.sessionToken };

      const onOk = res => {
        if (_checkSessionExpired(res)) return;
        if (btn) { btn.disabled=false; btn.innerHTML='<span class="material-icons-round">save</span> บันทึกแบบฟอร์ม'; }
        if (res.success) {
          Swal.fire({
            title: 'บันทึกสำเร็จ! 🎉',
            html: 'แบบฟอร์ม <strong>"' + formName + '"</strong><br />เก็บข้อมูล ' + selectedFields.length + ' รายการ พร้อมใช้งานแล้ว',
            icon: 'success', confirmButtonColor: 'var(--blue)', confirmButtonText: 'ตกลง'
          }).then(() => fbShowList());
        } else { showToast(res.message, 'error'); }
      };
      const onFail = () => {
        if (btn) { btn.disabled=false; btn.innerHTML='<span class="material-icons-round">save</span> บันทึกแบบฟอร์ม'; }
        showToast('บันทึกไม่สำเร็จ กรุณาลองใหม่อีกครั้ง', 'error');
      };

      if (typeof google !== 'undefined' && google.script) {
        google.script.run.withSuccessHandler(onOk).withFailureHandler(onFail).saveFormTemplate(payload);
      } else {
        setTimeout(() => onOk({ success: true }), 600);
      }
    }

    function renderAllFormsList(forms) {

    function _getAgencyChipsHtml(agencyId) {
      var agIds = (agencyId || 'ALL').split(',').map(function(s){ return s.trim(); });
      var isAll = agIds[0] === 'ALL' || agIds.length >= 13;
      if (isAll) return '<span class="fc-chip all">👥 ทุกสังกัด</span>';
      // จัดเรียงและแสดงชื่อไทย
      return agIds.slice(0,3).map(function(k){ return '<span class="fc-chip agency">' + (AGENCY_MAP[k]||k) + '</span>'; }).join('')

    function _getDeadlineBadgeHtml(deadline) {
      if (!deadline) return '';
      var dlDate  = new Date(deadline);
      var today   = new Date(); today.setHours(0,0,0,0);
      var diff    = Math.ceil((dlDate - today) / 86400000);
      var color   = diff < 0 ? '#d93025' : diff <= 3 ? '#f9ab00' : '#5f6368';
      var bg      = diff < 0 ? '#fce8e6' : diff <= 3 ? '#fffde7' : 'var(--s2)';
      var icon    = diff < 0 ? 'warning' : diff <= 3 ? 'timer' : 'event';
      var text    = diff < 0 ? 'เกิน ' + Math.abs(diff) + 'วัน' : diff === 0 ? 'วันนี้!' : diff + ' วัน';
      return '<span class="fc-badge" style="background:' + bg + ';color:' + color + ';">'
        + '<span class="material-icons-round" style="font-size:13px;">' + icon + '</span>' + text + '</span>';
    }

    function fbEditForm(encodedJson) {
      try {
        const formObj = JSON.parse(decodeURIComponent(encodedJson));
        document.getElementById('fb-list-view').style.display = 'none';
        document.getElementById('fb-wizard-view').style.display = '';
        document.getElementById('fb-wizard-title').innerHTML = '<span class="material-icons-round">edit</span> แก้ไขแบบฟอร์ม';
        document.getElementById('builderFormName').value     = formObj.formName;
        document.getElementById('builderFormId').value       = formObj.formId;
        fbSetAgencyValue(formObj.agencyId || 'ALL');
        var dlEl = document.getElementById('builderDeadline');
        if (dlEl) dlEl.value = formObj.deadline || '';

        selectedFields = [];
        const allBuiltin = Object.values(FB_CATALOG).flat();
        const allCustom  = Object.values(fbCustomItems).flat();
        const allCatItems = allBuiltin.concat(allCustom);
        (formObj.formConfig || []).forEach(c => {
          if (c.name === 'report_title') return;
          const match = allCatItems.find(a => a.name === c.name);
          if (match) {
            const merged = { ...match };
            if (c.required !== undefined) merged.required = c.required;
            if (c.min      !== undefined) merged.min      = c.min;
            if (c.max      !== undefined) merged.max      = c.max;
            selectedFields.push(merged);
          } else if (c.name) {
            // ฟิลด์เก่าที่ไม่อยู่ใน catalog
            const legacy = { name:c.name, label:c.label||c.name, icon: c.type==='section'?'view_headline':c.type==='checkbox'?'check_box':c.type==='radio'?'radio_button_checked':'tag', dash:false, type:c.type||'text', hint:'', required:c.required!==false, min:c.min, max:c.max, isCustom:true };
            if (c.type === 'section') legacy.required = false;
            if (!fbCustomItems.misc) fbCustomItems.misc = [];
            if (!fbCustomItems.misc.find(x => x.name === c.name)) {
              fbCustomItems.misc.push(legacy);
              fbSaveCustomItems();
            }
            selectedFields.push(legacy);
          }
        });

        fbRenderCheckboxes(catalogFilter);
        fbRenderPreview();
        showToast('โหลดแบบฟอร์ม "' + formObj.formName + '" สำเร็จ', 'success');
      } catch(e) { showToast('ไม่สามารถโหลดข้อมูลฟอร์มได้', 'error'); }
    }

    function deleteFormConfirm(formId, formName) {
      Swal.fire({
        title: 'ลบแบบฟอร์ม',
        html: 'คุณต้องการลบ <strong>"' + formName + '"</strong> ออกจากระบบ?',
        icon: 'warning', showCancelButton: true,
        confirmButtonText: 'ลบ', cancelButtonText: 'ยกเลิก',
        confirmButtonColor: '#d93025'
      }).then(r => {
        if (!r.isConfirmed) return;
        const payload = { formId, userRole: AppState.userRole, sessionToken: AppState.sessionToken };
        if (typeof google !== 'undefined' && google.script) {
          google.script.run
            .withSuccessHandler(res => { showToast(res.message, res.success?'success':'error'); if(res.success) loadAllFormsList(); })
            .withFailureHandler(() => showToast('ลบไม่สำเร็จ', 'error'))
            .deleteFormTemplate(payload);
        } else { showToast('ลบ "' + formName + '" เรียบร้อย (Mock)', 'success'); loadAllFormsList(); }
      });
    }

    function duplicateForm(formId) {
      if (!formId) return;
      const payload = { formId, userRole: AppState.userRole, sessionToken: AppState.sessionToken };
      if (typeof google !== 'undefined' && google.script) {
        google.script.run
          .withSuccessHandler(res => {
            if (_checkSessionExpired(res)) return;
            showToast(res.message, res.success ? 'success' : 'error');
            if (res.success) loadAllFormsList();
          })
          .withFailureHandler(() => showToast('คัดลอกไม่สำเร็จ', 'error'))
          .duplicateFormTemplate(payload);
      } else {
        showToast('คัดลอกแบบฟอร์ม (Mock)', 'success');
        loadAllFormsList();
      }
    }

    function fbShowPreview() {
      if (selectedFields.length === 0) { showToast('ยังไม่ได้เลือกฟิลด์ข้อมูล', 'warning'); return; }
      const formName = (document.getElementById('builderFormName')?.value || '').trim() || 'ตัวอย่างแบบฟอร์ม';
      const overlay  = document.getElementById('fb-preview-modal-overlay');
      const area     = document.getElementById('fb-preview-modal-body');
      if (!overlay || !area) return;

      const previewConfig = [{ name:'report_title', label:'หัวข้อการรายงาน', type:'text', required:true }]
        .concat(selectedFields.map(f => ({ name:f.name, label:f.label, type:f.type, required:f.required!==false, opts:f.opts||undefined, min:f.min, max:f.max })));

      // ใช้ class .g2 + .fi เหมือนฟอร์มจริง เพื่อให้ styling ตรงกัน
      const wrap = document.createElement('div');
      wrap.className = 'g2';

      previewConfig.forEach(f => {
        // Section header
        if (f.type === 'section') {
          const sec = document.createElement('div');
          sec.style.gridColumn = 'span 2';
          sec.style.display = 'flex';
          sec.style.alignItems = 'center';
          sec.style.gap = '8px';
          sec.style.padding = '10px 0 6px';
          sec.style.borderBottom = '2px solid var(--blue-l)';
          sec.innerHTML = '<span class="material-icons-round" style="font-size:16px;color:var(--blue);">view_headline</span>'
            + '<span style="font-size:13px;font-weight:700;color:var(--blue);">' + f.label + '</span>';
          wrap.appendChild(sec);
          return;
        }

        const div = document.createElement('div');
        div.className = 'fi';
        const req = f.required ? '<span style="color:var(--red);margin-left:2px;">*</span>' : '';
        let fieldHtml = '';

        if (f.name === 'report_title') {
          fieldHtml = `<input type="text" value="${formName}" readonly style="background:var(--s2);" />`;
          div.style.gridColumn = 'span 2';
        } else if (f.type === 'textarea') {
          fieldHtml = `<textarea rows="3" placeholder="${f.label}" style="height:80px;"></textarea>`;
          div.style.gridColumn = 'span 2';
        } else if (f.type === 'select' && f.opts) {
          const opts = f.opts.split('|').map(o => `<option>${o.trim()}</option>`).join('');
          fieldHtml = `<select><option value="">-- กรุณาเลือก --</option>${opts}</select>`;
        } else if (f.type === 'radio' && f.opts) {
          const radios = f.opts.split('|').map(o => o.trim()).filter(Boolean)
            .map(o => `<label style="display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:normal;cursor:pointer;margin-right:14px;"><input type="radio" disabled />${o}</label>`).join('');
          fieldHtml = `<div style="display:flex;flex-wrap:wrap;padding:8px 0;gap:4px;">${radios}</div>`;
          div.style.gridColumn = 'span 2';
        } else if (f.type === 'checkbox') {
          fieldHtml = `<label style="display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:normal;cursor:pointer;padding:8px 0;"><input type="checkbox" disabled /> ใช่ / มี</label>`;
        } else if (f.type === 'date') {
          fieldHtml = `<input type="date" />`;
        } else if (f.type === 'number') {
          const minAttr = f.min !== undefined ? ` min="${f.min}"` : '';
          const maxAttr = f.max !== undefined ? ` max="${f.max}"` : '';
          const hint = (f.min !== undefined || f.max !== undefined)
            ? `<div style="font-size:11px;color:var(--muted);margin-top:4px;">ช่วงที่อนุญาต: ${f.min??'ไม่จำกัด'} – ${f.max??'ไม่จำกัด'}</div>` : '';
          fieldHtml = `<input type="number"${minAttr}${maxAttr} placeholder="กรอกตัวเลข" />${hint}`;
        } else {
          fieldHtml = `<input type="text" placeholder="${f.label}" />`;
          if (f.type === 'text') div.style.gridColumn = 'span 2';
        }

        div.innerHTML = `<label>${f.label}${req}</label>${fieldHtml}`;
        wrap.appendChild(div);
      });

      area.innerHTML = '';
      area.appendChild(wrap);
      overlay.classList.add('open');
    }

    function submitUserForm() {
      const uname   = document.getElementById('uf_username').value.trim();
      const name    = document.getElementById('uf_name').value.trim();
      const pass    = document.getElementById('uf_password').value.trim();
      const role    = document.getElementById('uf_role').value;
      const agId    = document.getElementById('uf_agencyId').value;
      const status  = document.getElementById('uf_status').value;
      const isEdit  = document.getElementById('uf_isEdit').value === 'true';

      if(!uname || !name) { showToast('กรุณากรอกข้อมูลให้ครบถ้วน', 'warning'); return; }
      if(!isEdit && !pass) { showToast('กรุณากำหนดรหัสผ่านสำหรับบัญชีใหม่', 'warning'); return; }

      const payload = { username: uname, name, password: pass, role, agencyId: agId, status, isEdit, userRole: AppState.userRole, sessionToken: AppState.sessionToken };

      if (typeof google !== 'undefined' && google.script) {
        google.script.run
          .withSuccessHandler(res => {
            if(_checkSessionExpired(res)) return;
            showToast(res.message, res.success ? 'success' : 'error');
            if(res.success) { closeUserForm(); loadUsersList(); }
          })
          .withFailureHandler(() => showToast('เชื่อมต่อเซิร์ฟเวอร์ไม่สำเร็จ', 'error'))
          .saveUser(payload);
      } else {
        showToast((isEdit ? 'แก้ไข' : 'เพิ่ม') + `บัญชี "${uname}" เรียบร้อย (Mock)`, 'success');
        closeUserForm(); loadUsersList();
      }
    }

    function startGisEdit(key) {
      // ซ่อน edit row อื่นทั้งหมดก่อน
      document.querySelectorAll('[id^="gis-edit-row-"]').forEach(r => r.style.display = 'none');
