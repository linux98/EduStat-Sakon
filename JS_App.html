    // ค้นหา label ของ field จาก form config ที่โหลดไว้ → fallback ไปที่ static map
    function _getFieldLabel(fieldName, formId) {
      // 1. ค้นหาจาก form config ที่โหลดไว้ โดย match formId ก่อน
      var sources = [].concat(
        (typeof _fbAllForms !== 'undefined' ? _fbAllForms : []),
        (AppState.availableForms || [])
      );
      // ลอง match formId ก่อน ถ้าไม่พบค่อย scan ทั้งหมด
      for (var pass = 0; pass < 2; pass++) {
        for (var i = 0; i < sources.length; i++) {
          var f = sources[i];
          if (!f || !f.formConfig) continue;
          if (pass === 0 && formId && f.formId !== formId) continue;
          for (var j = 0; j < f.formConfig.length; j++) {
            if (f.formConfig[j].name === fieldName && f.formConfig[j].label) {
              return f.formConfig[j].label;
            }
          }
        }
      }
      // 2. Fallback: static map
      if (_STATIC_FIELD_LABELS[fieldName]) return _STATIC_FIELD_LABELS[fieldName];
      // 3. ไม่พบเลย — คืน null ให้ caller จัดการ
      return null;
    }

    let _heartbeatInterval = null;

    function _startSessionHeartbeat() {
      _stopSessionHeartbeat(); // clear ก่อนเสมอ
      if (!AppState.sessionToken) return;
      _heartbeatInterval = setInterval(function() {
        if (!AppState.sessionToken) { _stopSessionHeartbeat(); return; }

          google.script.run
            .withSuccessHandler(function(res) {
              if (res && res.expired) {

              }
              // res.success = true → session ถูกต่ออายุแล้ว ไม่ต้องทำอะไร
            })
            .withFailureHandler(function() { /* silent fail — ไม่รบกวน user */ })
            .refreshSession(AppState.sessionToken);
        }
      }, HEARTBEAT_MS);
    }

    function _stopSessionHeartbeat() {
      if (_heartbeatInterval) { clearInterval(_heartbeatInterval); _heartbeatInterval = null; }

    function toggleLiveSync() {
      var toggle    = document.getElementById('liveSyncToggle');
      var wrap      = document.getElementById('liveSyncWrap');
      var dot       = document.getElementById('liveSyncDot');
      var countdown = document.getElementById('liveSyncCountdown');

      // หยุด interval เดิมก่อนเสมอ
      if (liveSyncInterval)    { clearInterval(liveSyncInterval);    liveSyncInterval    = null; }
      if (liveSyncCountdownFn) { clearInterval(liveSyncCountdownFn); liveSyncCountdownFn = null; }

      if (toggle && toggle.checked) {
        wrap.classList.add('active');
        if (dot) { dot.style.background = 'var(--green)'; dot.style.boxShadow = '0 0 0 3px rgba(52,168,83,.25)'; }
        if (countdown) countdown.style.display = 'inline';

        var secsLeft = LIVE_SYNC_SECS;

        // countdown display
        function updateCountdown() {
          if (!countdown) return;
          var m = Math.floor(secsLeft / 60);
          var s = secsLeft % 60;
          countdown.innerText = m + ':' + (s < 10 ? '0' : '') + s;
        }
        updateCountdown();

        liveSyncCountdownFn = setInterval(function() {
          secsLeft--;
          if (secsLeft <= 0) secsLeft = LIVE_SYNC_SECS;
          updateCountdown();
          // pulse dot ขณะ sync
          if (secsLeft === LIVE_SYNC_SECS && dot) {
            dot.style.transform = 'scale(1.4)';
            setTimeout(function(){ if(dot) dot.style.transform = ''; }, 400);
          }
        }, 1000);

          var activeView = document.querySelector('.page.on')?.id || '';

        }, LIVE_SYNC_SECS * 1000);

        wrap.classList.remove('active');
        if (dot) { dot.style.background = 'var(--muted)'; dot.style.boxShadow = 'none'; }
        if (countdown) { countdown.style.display = 'none'; countdown.innerText = ''; }

      }

        var text = item.innerText.toLowerCase();

        resultsEl = document.createElement('div');

        resultsEl.style.cssText = 'border-top:1px solid var(--border-l);padding:8px 0;max-height:200px;overflow-y:auto;';
        var omniBody = document.querySelector('.om-body');
        if (omniBody) omniBody.appendChild(resultsEl);
      }

      if (input.length < 2) { resultsEl.innerHTML = ''; return; }

      var matched = (AppState.currentDataList || []).filter(function(r) {
        var title  = (r.reportTitle || r.title || '').toLowerCase();
        var agency = (r.agencyName || agencyName(r.agencyId) || r.agencyId || '').toLowerCase();
        return title.includes(input) || agency.includes(input);
      }).slice(0, 6);

      resultsEl.innerHTML = '';
      if (matched.length === 0) {
        var noResult = document.createElement('div');
        noResult.style.cssText = 'padding:8px 16px;font-size:12px;color:var(--muted);';

        return;

      header.style.cssText = 'padding:4px 16px;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.4px;';
      header.innerText = 'รายงานที่พบ';
      resultsEl.appendChild(header);

      matched.forEach(function(r) {
        var sc = r.status === 'อนุมัติแล้ว' ? 'var(--green)' : r.status === 'รออนุมัติ' ? 'var(--yellow)' : 'var(--muted)';

          + '</div>'

    // 🔄 Auto Live-Sync
    function showToast(message, type = 'success') {
      const container = document.getElementById('toasts');
      if (!container) return;
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `<span class="material-icons-round">${type==='success'?'check_circle':type==='error'?'error':type==='warning'?'warning':'info'}</span><span>${message}</span>`;
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.animation = 'fadeOut 0.4s forwards';
        setTimeout(() => toast.remove(), 400);
      }, 3500);
    }

    function animateValue(id, start, end, duration) {
      const obj = document.getElementById(id);
      if (!obj) return;
      
      if (obj.animateInterval) {
        clearInterval(obj.animateInterval);
      }
      
      if (start === end) { obj.innerText = end.toLocaleString(); return; }
      
      let range = end - start;
      let current = start;
      let steps = Math.max(1, Math.floor(duration / 16));
      let increment = range / steps;
      
      obj.animateInterval = setInterval(function() {
        current += increment;
        let isDone = (increment > 0 && current >= end) || (increment < 0 && current <= end);
        
        if (isDone) {
          current = end;
          clearInterval(obj.animateInterval);
        }
        obj.innerText = Math.round(current).toLocaleString();
      }, 16);
    }

    function cbPinKey(d) {
      if (_cbPin.length >= 4) return;
      _cbPin += d;
      cbUpdateDots();
      if (_cbPin.length === 4) setTimeout(cbPinSubmit, 120);
    }
    function cbPinClear() { _cbPin = ''; cbUpdateDots(); document.getElementById('cb-pin-error').innerText = ''; }
    function cbUpdateDots() {
      document.querySelectorAll('.pin-dot').forEach(function(d, i) {
        d.classList.toggle('filled', i < _cbPin.length);
      });
    }
    function cbPinSubmit() {
      if (!_cbPin) return;
      var pin = _cbPin;
      _cbPin = '';
      cbUpdateDots();
      document.getElementById('cb-pin-error').innerText = '';

      if (typeof google !== 'undefined' && google.script) {
        google.script.run
          .withSuccessHandler(function(res) {
            if (res && res.success) {
              sessionStorage.setItem(CB_SESSION_KEY, '1');
              document.getElementById('cb-pin-screen').style.display = 'none';
              document.getElementById('cb-chat-screen').style.display = 'flex';
              if (_cbHistory.length === 0) cbWelcome();

          })
          .verifyChatbotPin({ sessionToken: AppState.sessionToken, pin: pin });

          sessionStorage.setItem(CB_SESSION_KEY, '1');
          document.getElementById('cb-pin-screen').style.display = 'none';
          document.getElementById('cb-chat-screen').style.display = 'flex';

    function cbWelcome() {

      cbAddBubble('ai', 'สวัสดีครับ 👋\n\nผมคือ AI ผู้ช่วยสารสนเทศการศึกษาจังหวัดสกลนคร ยินดีตอบคำถามเกี่ยวกับข้อมูลสถิติการศึกษา สถานะการรายงาน และข้อมูลเชิงนโยบายทุกด้าน\n\nมีอะไรให้ช่วยไหมครับ?', now);

    function cbAddBubble(role, text, time) {
      var container = document.getElementById('cb-messages');
      var row = document.createElement('div');
      row.className = 'cb-row ' + (role === 'ai' ? 'ai-row' : 'user-row');
      var bubble = document.createElement('div');
      bubble.className = 'cb-bubble ' + role;
      bubble.innerText = text;
      var ts = document.createElement('div');
      ts.className = 'cb-time';
      ts.innerText = time || new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
      row.appendChild(bubble);
      row.appendChild(ts);
      container.appendChild(row);
      container.scrollTop = container.scrollHeight;
      return row;
    }

    function cbShowTyping() {
      var container = document.getElementById('cb-messages');
      var row = document.createElement('div');
      row.className = 'cb-row ai-row';
      row.id = 'cb-typing';
      row.innerHTML = '<div class="cb-bubble typing"><span style="display:inline-flex;gap:4px;align-items:center;">'
        + '<span style="width:7px;height:7px;border-radius:50%;background:var(--muted);animation:cb-dot 1.2s infinite .0s"></span>'
        + '<span style="width:7px;height:7px;border-radius:50%;background:var(--muted);animation:cb-dot 1.2s infinite .2s"></span>'
        + '<span style="width:7px;height:7px;border-radius:50%;background:var(--muted);animation:cb-dot 1.2s infinite .4s"></span>'
        + '</span></div>';
      container.appendChild(row);
      container.scrollTop = container.scrollHeight;
    }
    function cbHideTyping() {
      var t = document.getElementById('cb-typing');
      if (t) t.remove();
    }

    function cbSend() {
      var input = document.getElementById('cb-input');
      var text = (input.value || '').trim();
      if (!text) return;
      input.value = '';
      cbInputAutoResize(input);
      document.getElementById('cb-suggestions').style.display = 'none';
      cbSendMessage(text);
    }
    function cbSendSuggestion(btn) {
      var text = btn.innerText.replace(/^[^\w฀-๿]+/, '').trim();
      document.getElementById('cb-suggestions').style.display = 'none';
      cbSendMessage(text);
    }
    function cbInputKeydown(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); cbSend(); }
    }
    function cbInputAutoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function cbSendMessage(text) {
      var now = new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
      cbAddBubble('user', text, now);
      _cbHistory.push({ role: 'user', text: text });

      document.getElementById('cb-send-btn').disabled = true;
      cbShowTyping();

      // ส่งแค่ 5 รอบล่าสุด (10 messages) เพื่อประหยัด token
      var historySlice = _cbHistory.slice(-10);

      if (typeof google !== 'undefined' && google.script) {
        google.script.run
          .withSuccessHandler(function(res) {
            cbHideTyping();
            document.getElementById('cb-send-btn').disabled = false;
            var t = new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
            if (res && res.success) {
              cbAddBubble('ai', res.reply, t);
              _cbHistory.push({ role: 'model', text: res.reply });
            } else {
              cbAddBubble('ai', '⚠️ ' + (res && res.message ? res.message : 'เกิดข้อผิดพลาด'), t);
            }
            // แสดง badge บน FAB ถ้า drawer ปิดอยู่
            var drawer = document.getElementById('cb-drawer');
            if (drawer && !drawer.classList.contains('open')) {
              var badge = document.getElementById('cb-fab-badge');
              if (badge) badge.style.display = 'block';
            }
          })
          .withFailureHandler(function(err) {
            cbHideTyping();
            document.getElementById('cb-send-btn').disabled = false;
            cbAddBubble('ai', '⚠️ เรียก AI ไม่สำเร็จ: ' + (err && err.message ? err.message : String(err)), '');
          })
          .askChatbot({ sessionToken: AppState.sessionToken, message: text, history: historySlice });
      } else {
        setTimeout(function() {
          cbHideTyping();
          document.getElementById('cb-send-btn').disabled = false;
          cbAddBubble('ai', '[Mock] ระบบ AI พร้อมใช้งานเมื่อเชื่อมต่อ Google Apps Script แล้วครับ', '');
          _cbHistory.push({ role: 'model', text: '[Mock]' });
        }, 1000);
      }
    }

      const text = document.getElementById('aiSummaryText').innerText;

      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(function() { showToast('คัดลอกข้อความแล้ว', 'success'); });
      } else {
        const ta = document.createElement('textarea');
        ta.value = text; document.body.appendChild(ta); ta.select();
        document.execCommand('copy'); document.body.removeChild(ta);
        showToast('คัดลอกข้อความแล้ว', 'success');
      }
    }

.cover-header { background: linear-gradient(135deg, #7b1fa2, #1a73e8); padding: 48px 40px; color: #fff; text-align: center; border-radius: 12px; margin-bottom: 30px; }
.cover-title { font-size: 26px; font-weight: 700; margin-bottom: 12px; line-height: 1.35; }
.cover-sub { font-size: 14px; opacity: 0.9; font-weight: 500; }
.section-title { font-size: 18px; font-weight: 700; color: #7b1fa2; border-bottom: 2px solid #f3e5f5; padding-bottom: 6px; margin: 24px 0 14px; display: flex; align-items: center; gap: 8px; }
.kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
.kpi-card { background: #f8f9fa; border: 1.5px solid #e8eaed; border-radius: 12px; padding: 16px 12px; text-align: center; border-top: 4px solid #1a73e8; }
.kpi-card.purple { border-top-color: #7b1fa2; }
.kpi-card-val { font-size: 24px; font-weight: 700; color: #202124; line-height: 1.1; margin-bottom: 4px; }
.kpi-card-lbl { font-size: 11px; color: #5f6368; font-weight: 600; }

.chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
.chart-card { border: 1.5px solid #e8eaed; border-radius: 12px; padding: 12px; background: #fff; text-align: center; }
.chart-card-title { font-size: 12.5px; font-weight: 700; color: #1a73e8; margin-bottom: 8px; text-align: left; border-left: 3px solid #1a73e8; padding-left: 6px; }
.chart-card img { max-width: 100%; height: auto; max-height: 200px; }

.footer-meta { font-size: 11px; color: #9aa0a6; border-top: 1px solid #e8eaed; padding-top: 14px; display: flex; justify-content: space-between; align-items: center; position: absolute; bottom: 40px; left: 50px; right: 50px; }

/* Email Dialog Styling */
.email-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
.email-modal { background: #fff; border-radius: 12px; padding: 24px; width: 100%; max-width: 420px; box-shadow: 0 10px 25px rgba(0,0,0,0.25); }
.email-modal h3 { font-size: 16px; font-weight: 700; color: #7b1fa2; margin-bottom: 12px; }
.email-modal input { width: 100%; padding: 10px 14px; border: 1.5px solid #dadce0; border-radius: 8px; font-size: 13.5px; outline: none; margin-bottom: 16px; }
.email-modal input:focus { border-color: #7b1fa2; }
.email-modal-footer { display: flex; justify-content: flex-end; gap: 8px; }
.email-modal-footer button { padding: 8px 16px; border-radius: 16px; border: none; font-size: 12.5px; font-weight: 700; cursor: pointer; }
.btn-cancel { background: #f1f3f4; color: #5f6368; }
.btn-submit { background: #7b1fa2; color: #fff; }

@media print {
  body { background: #fff; padding: 0; }
  .briefing-container { box-shadow: none; border-radius: 0; max-width: 100%; }
  .no-print { display: none !important; }
  .doc-page { min-height: auto; padding: 0; page-break-inside: avoid; }
  .footer-meta { position: static; margin-top: 30px; }
}

    // 📅 Format date value to Thai Buddhist Era format
    function formatThaiDateTime(dateVal) {
      if (!dateVal) return 'ไม่ระบุ';
      let date;
      const str = String(dateVal).trim();
      
      // Check if it matches dd/MM/yyyy HH:mm:ss format
      const parts = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})\s+(\d{1,2}):(\d{1,2}):(\d{1,2})$/);
      if (parts) {
        const day = parseInt(parts[1], 10);
        const month = parseInt(parts[2], 10) - 1;
        const year = parseInt(parts[3], 10);
        const hour = parseInt(parts[4], 10);
        const minute = parseInt(parts[5], 10);
        const second = parseInt(parts[6], 10);
        date = new Date(year, month, day, hour, minute, second);
      } else {
        date = new Date(dateVal);
      }
      
      if (isNaN(date.getTime())) {
        return str; // Return original string if conversion fails
      }
      
      const months = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
      const day = date.getDate();
      const month = months[date.getMonth()];
      const year = date.getFullYear() + (date.getFullYear() < 2500 ? 543 : 0); // Convert to Buddhist Year if CE
      
      const hour = String(date.getHours()).padStart(2, '0');
      const minute = String(date.getMinutes()).padStart(2, '0');
      const second = String(date.getSeconds()).padStart(2, '0');
      
      return `${day} ${month} ${year} ${hour}:${minute}:${second} น.`;
    }

    // 📞 Format contact number to ensure leading 0 is preserved
    function formatContactNumber(val) {
      const s = String(val || '').trim();
      // If numeric and 8 or 9 digits, it is missing the leading 0
      if (/^\d{8,9}$/.test(s)) {
        return '0' + s;
      }
      return s;
    }

    // 🔐 Login System (เชื่อมฐานข้อมูล Users)
    function handleLogin(e){
      e.preventDefault();
      var userEl=document.getElementById('loginUsername');
      var passEl=document.getElementById('loginPassword');
      if(!userEl||!passEl)return;
      var lockMins=(typeof sessionCheckLoginLock==='function')?sessionCheckLoginLock():false;
      if(lockMins){showToast('บัญชีถูกล็อก กรุณารอ '+lockMins+' นาที','error');passEl.value='';return;}
      var btn=document.getElementById('loginSubmitBtn');
      var origTxt=btn.innerHTML;
      btn.disabled=true;
      btn.innerHTML='<span class="material-icons-round" style="font-size:18px; animation:spin .7s linear infinite; margin-right:6px;">refresh</span>กำลังตรวจสอบ...';
      var payload={username:userEl.value.toLowerCase().trim(),password:passEl.value.trim()};
      function onSuccess(res){
        btn.disabled=false;btn.innerHTML=origTxt;
        if(res.success){
          if(typeof sessionRecordLoginSuccess==='function')sessionRecordLoginSuccess();
          AppState.sessionToken=res.sessionToken;
          AppState.userRole=res.userData.role;AppState.userName=res.userData.name;
          AppState.userAgencyId=res.userData.agencyId||res.userData.agency;AppState.userAgency=res.userData.agency;
          localStorage.setItem('eduData_token', res.sessionToken||'');
          setupUIAfterLogin();
        }else{
          var locked=(typeof sessionRecordLoginFail==='function')?sessionRecordLoginFail():false;
          var left=5-(_loginAttempts||0);
          if(locked){showToast('บัญชีถูกล็อก 5 นาที เนื่องจากป้อนรหัสผิดเกิน 5 ครั้ง','error');}
          else{showToast((res.message||'รหัสผ่านไม่ถูกต้อง')+(left>0?' (เหลือ '+left+' ครั้ง)':''),'error');}
          passEl.value='';
        }
      }
      function onFail(){btn.disabled=false;btn.innerHTML=origTxt;showToast('เกิดข้อผิดพลาดในการเชื่อมต่อ','error');}
      if(typeof google!=='undefined'&&google.script){
        google.script.run.withSuccessHandler(onSuccess).withFailureHandler(onFail).authenticateUser(payload);
      }else{
        // Dev mode: google.script ไม่มี — ไม่รองรับการล็อกอินเพื่อความปลอดภัย
        setTimeout(function(){
          btn.disabled=false; btn.innerHTML=origTxt;
          showToast('กรุณาเปิดระบบผ่าน Google Apps Script (Deploy URL)', 'error');
        }, 400);
      }
    }

      localStorage.removeItem('eduData_role');

      localStorage.removeItem('eduData_agencyId');
      localStorage.removeItem('eduData_agency');

    function applyBadge(count) {

       if(count > 0) {
          badge.classList.add('active');
          countEl.innerText = count;
          countEl.classList.add('active');
       } else {
          badge.classList.remove('active');

    function _loadDeadlineNotifications() {
      if (!AppState.sessionToken || typeof google === 'undefined' || !google.script) return;
      google.script.run
        .withSuccessHandler(function(res) {
          if (!res || !res.success || !res.items || res.items.length === 0) return;
          _renderDeadlineBanner(res.items);
        })
        .withFailureHandler(function() {})
        .getUpcomingDeadlines({ sessionToken: AppState.sessionToken });

    function _renderDeadlineBanner(items) {
      // ลบ banner เดิมก่อน (ถ้ามี)
      var existing = document.getElementById('globalDeadlineBanner');
      if (existing) existing.remove();

      var mainPanel = document.querySelector('.main');
      var contentArea = document.querySelector('.content');
      if (!mainPanel || !contentArea) return;

      var urgent   = items.filter(function(i){ return i.urgent; });
      var normal   = items.filter(function(i){ return !i.urgent; });
      var hasUrgent = urgent.length > 0;

      var banner = document.createElement('div');
      banner.id = 'globalDeadlineBanner';
      banner.className = 'global-deadline-banner' + (hasUrgent ? ' urgent' : '');

      var icon    = hasUrgent ? 'warning' : 'schedule';
      var color   = hasUrgent ? 'var(--red, #ea4335)' : 'var(--yellow, #f9ab00)';
      var bgcolor = hasUrgent ? 'rgba(234,67,53,.15)' : 'rgba(249,171,0,.15)';

      var listHtml = items.slice(0, 5).map(function(item) {
        var label = item.daysLeft === 0
          ? '<span style="color:var(--red,#ea4335);font-weight:700;">ครบกำหนดวันนี้!</span>'
          : item.daysLeft === 1
            ? '<span style="color:var(--red,#ea4335);font-weight:700;">เหลือ 1 วัน!</span>'
            : '<span style="color:' + (item.urgent ? 'var(--red,#ea4335)' : 'var(--yellow,#f9ab00)') + ';font-weight:600;">เหลือ ' + item.daysLeft + ' วัน</span>';
        return '<span class="dl-chip">'
          + '<span class="material-icons-round" style="font-size:13px;vertical-align:middle;">description</span>&nbsp;'
          + item.formName + '&nbsp;(' + item.deadline + ')&nbsp;' + label
          + '</span>';
      }).join('');

      var moreHtml = items.length > 5
        ? '<span style="font-size:12px;color:var(--muted);margin-left:8px;">+อีก ' + (items.length - 5) + ' รายการ</span>'
        : '';

      banner.innerHTML = `
        <div class="dl-banner-inner" style="background:${bgcolor};border-left:4px solid ${color};">
          <span class="material-icons-round" style="font-size:20px;color:${color};flex-shrink:0;">${icon}</span>
          <div class="dl-banner-text">
            <strong style="color:${color};font-size:13px;">แจ้งเตือน: แบบฟอร์มใกล้ครบกำหนด</strong>
            <div class="dl-chips-row">${listHtml}${moreHtml}</div>
          </div>
          <button class="dl-dismiss-btn" onclick="this.closest('#globalDeadlineBanner').remove();" title="ปิด">
            <span class="material-icons-round" style="font-size:18px;color:var(--muted);">close</span>
          </button>
        </div>`;

      // แทรกเป็นลูกคนแรกใน content area
      contentArea.insertBefore(banner, contentArea.firstChild);
    }

    window.changeMapLayer = function(layer) {
      currentMapLayer = layer;
      if (AppState.currentDashboardData) {
        var filteredPoints = (AppState.currentDashboardData.mapPoints || []);
        var _fAgency = (document.getElementById('filterAgency') || {}).value || 'all';

    function initMap() {
      const mapEl = document.getElementById('map');
      if(!mapEl) return;
      if(!map) {
        map = L.map('map').setView([17.1664, 104.1486], 10);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
          attribution: '&copy; OpenStreetMap'
        }).addTo(map);
        markerGroup = L.layerGroup().addTo(map);
        updateMapLegend(currentMapLayer);
      }
      setTimeout(() => { if(map) map.invalidateSize(); }, 200);
    }

    function updateMapMarkers(points) {
      if(!markerGroup) return;
      markerGroup.clearLayers();
      if (!points || points.length === 0) return;

      points.forEach(p => {
        if(!p.lat || !p.lng) return;

        if (currentMapLayer === 'pins') {
          // สีตาม hasData: มีข้อมูล = น้ำเงิน, ยังไม่มี = เทา
          const color  = p.hasData ? '#1a73e8' : '#9aa0a6';
          const shadow = p.hasData ? 'rgba(26,115,232,.35)' : 'rgba(154,160,166,.3)';
          const icon2  = p.hasData ? 'school' : 'radio_button_unchecked';

          const iconHtml = `<div class="map-marker-pulse" style="background:${color};box-shadow:0 0 0 4px ${shadow};">
            <span class="material-icons-round" style="font-size:15px;color:white;">${icon2}</span>
          </div>`;
          const customIcon = L.divIcon({ html: iconHtml, className:'', iconSize:[32,32], iconAnchor:[16,16] });

          const popupContent = p.hasData
            ? `<div class="dm-popup">
                <h3><span class="material-icons-round" style="font-size:18px;color:#1a73e8;">school</span> ${p.name}</h3>
                <div class="dm-popup-stat">
                  สถานศึกษา <strong>${(p.schools||0).toLocaleString()}</strong> แห่ง &nbsp;|&nbsp;
                  ผู้เรียน <strong>${(p.students||0).toLocaleString()}</strong> คน &nbsp;|&nbsp;
                  ครู <strong>${(p.teachers||0).toLocaleString()}</strong> คน
                </div>
                <div class="dm-popup-zone" style="margin-top:6px;color:#1e8e3e;font-size:11px;">✅ ส่งข้อมูลแล้ว</div>
                <div style="margin-top:8px; border-top:1px dashed var(--border-l); padding-top:8px; text-align:right;">
                  <button class="btn btn-filled btn-sm" onclick="window.filterDashboardFromMap('${p.agencyId}')" style="height:26px; font-size:11px; padding:0 8px; border-radius:4px; gap:4px; width:100%; display:flex; justify-content:center; align-items:center; border:none; cursor:pointer;">
                    <span class="material-icons-round" style="font-size:14px;">filter_alt</span> แสดงข้อมูลสังกัดนี้
                  </button>
                </div>
              </div>`
            : `<div class="dm-popup">
                <h3><span class="material-icons-round" style="font-size:18px;color:#9aa0a6;">business</span> ${p.name}</h3>
                <div class="dm-popup-zone" style="margin-top:4px;color:#9aa0a6;font-size:12px;">⏳ ยังไม่มีข้อมูลที่อนุมัติแล้ว</div>
                <div style="margin-top:8px; border-top:1px dashed var(--border-l); padding-top:8px; text-align:right;">
                  <button class="btn btn-outlined btn-sm" onclick="window.filterDashboardFromMap('${p.agencyId}')" style="height:26px; font-size:11px; padding:0 8px; border-radius:4px; gap:4px; width:100%; display:flex; justify-content:center; align-items:center; cursor:pointer;">
                    <span class="material-icons-round" style="font-size:14px;">filter_alt</span> แสดงข้อมูลสังกัดนี้
                  </button>
                </div>
              </div>`;

          const marker = L.marker([p.lat, p.lng], {icon: customIcon}).bindPopup(popupContent);
          markerGroup.addLayer(marker);

        } else if (currentMapLayer === 'students') {
          // Density Bubble
          const stdCount = p.students || 0;
          let color = '#34a853'; // green
          if (stdCount > 10000) color = '#ea4335'; // red
          else if (stdCount >= 2000) color = '#fbbc04'; // yellow
          
          const radius = Math.max(8, Math.min(36, Math.sqrt(stdCount) * 0.35));

          const popupContent = `
            <div class="dm-popup">
              <h3><span class="material-icons-round" style="font-size:18px;color:#7b1fa2;">groups</span> ${p.name}</h3>
              <div class="dm-popup-stat" style="margin-top:6px;">
                จำนวนผู้เรียนทั้งหมด: <strong style="font-size:14px;color:${color}">${stdCount.toLocaleString()}</strong> คน<br/>
                จำนวนสถานศึกษา: <strong>${(p.schools||0).toLocaleString()}</strong> แห่ง<br/>
                จำนวนครู: <strong>${(p.teachers||0).toLocaleString()}</strong> คน
              </div>
              <div style="margin-top:8px; border-top:1px dashed var(--border-l); padding-top:8px;">
                <button class="btn btn-filled btn-sm" onclick="window.filterDashboardFromMap('${p.agencyId}')" style="height:26px; font-size:11px; padding:0 8px; border-radius:4px; width:100%; border:none; cursor:pointer;">
                  <span class="material-icons-round" style="font-size:14px;">filter_alt</span> แสดงข้อมูลสังกัดนี้
                </button>
              </div>
            </div>`;

          const circle = L.circleMarker([p.lat, p.lng], {
            radius: radius,
            color: color,
            fillColor: color,
            fillOpacity: 0.25,
            weight: 2,
            opacity: 0.8
          }).bindPopup(popupContent);

          markerGroup.addLayer(circle);

        } else if (currentMapLayer === 'teachers') {
          // Ratio Bubble
          const stdCount = p.students || 0;
          const tchCount = p.teachers || 0;
          const ratio = tchCount > 0 ? parseFloat((stdCount / tchCount).toFixed(1)) : 0;

          let color = '#9aa0a6'; // grey if no data
          let statusText = 'ไม่มีข้อมูลสถิติที่ได้รับอนุมัติ';
          if (tchCount > 0) {
            if (ratio > 25) {
              color = '#ea4335'; // Red
              statusText = '🚨 ครูภาระงานสูง (ครู 1 คน : นักเรียน &gt; 25 คน)';
            } else if (ratio >= 15) {
              color = '#fbbc04'; // Yellow
              statusText = '⚠️ ปานกลาง (ครู 1 คน : นักเรียน 15 - 25 คน)';
            } else {
              color = '#34a853'; // Green
              statusText = '✅ เพียงพอตามเกณฑ์ (ครู 1 คน : นักเรียน &lt; 15 คน)';
            }
          }

          const popupContent = `
            <div class="dm-popup">
              <h3><span class="material-icons-round" style="font-size:18px;color:#00796b;">co_present</span> ${p.name}</h3>
              <div class="dm-popup-stat" style="margin-top:6px;">
                สัดส่วนนักเรียนต่อครู: <strong style="font-size:14px;color:${color}">${ratio > 0 ? '1 : ' + ratio : '—'}</strong><br/>
                จำนวนผู้เรียน: <strong>${stdCount.toLocaleString()}</strong> คน<br/>
                จำนวนครู: <strong>${tchCount.toLocaleString()}</strong> คน
              </div>
              <div style="font-size:11px;margin-top:6px;font-weight:600;color:${color}">${statusText}</div>
              <div style="margin-top:8px; border-top:1px dashed var(--border-l); padding-top:8px;">
                <button class="btn btn-filled btn-sm" onclick="window.filterDashboardFromMap('${p.agencyId}')" style="height:26px; font-size:11px; padding:0 8px; border-radius:4px; width:100%; border:none; cursor:pointer;">
                  <span class="material-icons-round" style="font-size:14px;">filter_alt</span> แสดงข้อมูลสังกัดนี้
                </button>
              </div>
            </div>`;

          const circle = L.circleMarker([p.lat, p.lng], {
            radius: 14,
            color: color,
            fillColor: color,
            fillOpacity: 0.35,
            weight: 2,
            opacity: 0.9
          }).bindPopup(popupContent);

          markerGroup.addLayer(circle);
        }
      });

      // Fit map to show all markers
      try {
        const lats = points.map(p => p.lat), lngs = points.map(p => p.lng);
        if (lats.length > 0) {
          const bounds = L.latLngBounds(points.map(p => [p.lat, p.lng]));
          if (map) map.fitBounds(bounds.pad(0.1));
        }
      } catch(e) {}
    }

        if (btnReset) {

        loadDashboardData(true);
        
        if (agencyId !== 'all' && map && AppState.currentDashboardData && AppState.currentDashboardData.mapPoints) {
          const pt = AppState.currentDashboardData.mapPoints.find(p => p.agencyId === agencyId);
          if (pt && pt.lat && pt.lng) {
            map.setView([pt.lat, pt.lng], 12);
          }
        }
      }
    };

        if (!gisMiniMapInstance) {
          gisMiniMapInstance = L.map('gisMiniMap').setView([17.1664, 104.1486], 11);
          L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap'
          }).addTo(gisMiniMapInstance);
          
          gisMiniMapInstance.on('click', function(e) {
            setMiniMapMarker(e.latlng.lat, e.latlng.lng);
          });
          gisMiniMapInstance.on('dblclick', function(e) {
            setMiniMapMarker(e.latlng.lat, e.latlng.lng);
          });
        }
        
        gisMiniMapInstance.invalidateSize();
        
        if (!isNaN(currentLat) && !isNaN(currentLng) && currentLat !== 0 && currentLng !== 0) {
          setMiniMapMarker(currentLat, currentLng);
          gisMiniMapInstance.setView([currentLat, currentLng], 14);
        } else {
          // ถ้าไม่มีพิกัดเดิม ให้เซ็ตค่าสกลนครเป็นค่าเริ่มต้น แต่ยังไม่ต้องมี marker
          if (gisPinMarker) {
            gisMiniMapInstance.removeLayer(gisPinMarker);
            gisPinMarker = null;
          }
          gisMiniMapInstance.setView([17.1664, 104.1486], 11);
          if (display) display.innerText = 'พิกัดที่เลือก: ไม่ระบุ';
          tempGisLat = null;
          tempGisLng = null;
        }
      }, 300);
    };

    function setMiniMapMarker(lat, lng) {
      tempGisLat = lat;
      tempGisLng = lng;
      
      const display = document.getElementById('gisPinCoordsDisplay');
      if (display) display.innerText = `พิกัดที่เลือก: ${lat.toFixed(6)}, ${lng.toFixed(6)}`;
      
      if (gisPinMarker) {
        gisPinMarker.setLatLng([lat, lng]);
      } else {
        gisPinMarker = L.marker([lat, lng], { draggable: true }).addTo(gisMiniMapInstance);
        gisPinMarker.on('dragend', function(e) {
          const pos = e.target.getLatLng();
          tempGisLat = pos.lat;
          tempGisLng = pos.lng;
          if (display) display.innerText = `พิกัดที่เลือก: ${pos.lat.toFixed(6)}, ${pos.lng.toFixed(6)}`;
        });
      }
    }

    function safeEChartsInit(el) {
      if (!el) return null;
      // ถ้า el มี instance อยู่แล้วให้ dispose ก่อน init ใหม่
      var existing = echarts.getInstanceByDom(el);
      if (existing) existing.dispose();
      var chart = echarts.init(el, null, { renderer: 'canvas' });
      // resize หลัง browser paint เสร็จ
      requestAnimationFrame(function() {
        requestAnimationFrame(function() {
          chart.resize();
        });
      });
      return chart;
    }

    function initECharts() {
      const cAgency = document.getElementById('chartAgency');
      const cStudent = document.getElementById('chartStudent');
      const cTeacher = document.getElementById('chartTeacher');
      const cSpecial = document.getElementById('chartSpecial');

      if(!eChartAgency && cAgency) eChartAgency = safeEChartsInit(cAgency);
      if(!eChartStudent && cStudent) eChartStudent = safeEChartsInit(cStudent);
      if(!eChartTeacher && cTeacher) eChartTeacher = safeEChartsInit(cTeacher);
      if(!eChartSpecial && cSpecial) eChartSpecial = safeEChartsInit(cSpecial);

      // ตั้ง ResizeObserver หลัง init เสมอ
      setupChartResizeObserver();

      // 🎯 Interactive Cross-Filtering Event Listener
      if(eChartAgency) {
        eChartAgency.off('click'); // Prevent duplicates
        eChartAgency.on('click', function (params) {
           const filterEl = document.getElementById('filterAgency');
           if(filterEl) {
              const options = Array.from(filterEl.options);
              const match = options.find(o => o.text === params.name);
              if(match) {
                 filterEl.value = match.value;
                 loadDashboardData();
                 showToast(`กรองข้อมูลตามสังกัด: ${params.name}`, 'info');
              }
           }
        });
      }
    }

    window.addEventListener('resize', () => {
      if(eChartAgency) eChartAgency.resize();
      if(eChartStudent) eChartStudent.resize();
      if(eChartTeacher) eChartTeacher.resize();
      if(eChartSpecial) eChartSpecial.resize();
    });

    function populateAgencyFilter() {
      var sel = document.getElementById('filterAgency');
      if (!sel) return;
      
      if (AppState.userRole === 'agency') {
        var myAgId = AppState.userAgencyId || AppState.userAgency;
        var myAgName = AGENCY_MAP[myAgId] || myAgId;
        sel.innerHTML = '<option value="' + myAgId + '" selected>' + myAgName + '</option>';
        sel.disabled = true;
        
        var wrap = sel.closest('.search-wrap');
        if (wrap) wrap.style.display = 'none';
      } else {
        sel.disabled = false;
        var wrap = sel.closest('.search-wrap');
        if (wrap) wrap.style.display = 'flex';
        
        var current = sel.value;
        sel.innerHTML = '<option value="all">ทุกสังกัด</option>'
          + Object.keys(AGENCY_MAP).map(function(k) {
              return '<option value="' + k + '"' + (k === current ? ' selected' : '') + '>'
                + (AGENCY_MAP[k] || k) + '</option>';
            }).join('');
      }
    }

    function populateYearFilter(dataList) {
      var sel = document.getElementById('filterYear');
      if (!sel || !dataList || dataList.length === 0) return;
      var years = new Set();
      dataList.forEach(function(r) {
        if (!r.timestamp) return;
        var m = String(r.timestamp).match(/(\d{4})/);
        if (m) {
          var y = parseInt(m[1]);
          // แปลง ค.ศ. → พ.ศ.
          years.add(y > 2500 ? y : y + 543);
        }
      });
      var sorted = Array.from(years).sort(function(a,b){ return b-a; });
      // เก็บ value ที่เลือกอยู่
      var current = sel.value;
      sel.innerHTML = '<option value="all">ทุกปีการศึกษา</option>'
        + sorted.map(function(y) {
          return '<option value="' + y + '"' + (String(y) === current ? ' selected' : '') + '>ปี ' + y + '</option>';
        }).join('');
    }

    function loadDashboardData(silent = false) {
      if(!silent) showToast('กำลังประมวลผลข้อมูล...', 'info');
      
      const fYearEl = document.getElementById('filterYear');
      const fAgencyEl = document.getElementById('filterAgency');
      const fYear = fYearEl ? fYearEl.value : 'all';
      const fAgency = fAgencyEl ? fAgencyEl.value : 'all';
      
      if (typeof google !== 'undefined' && google.script) {
        google.script.run
          .withSuccessHandler(data => {
            processDashboardData(data);
          })
          .withFailureHandler(() => {
            if(!silent) showToast('โหลดข้อมูลล้มเหลว', 'error');
          })
          .getDashboardData({ sessionToken: AppState.sessionToken, filterYear: fYear, filterAgency: fAgency });
      } else {
        setTimeout(() => {
          let mockAgencyData = [];
          const ags = [
            'สพป.สกลนคร เขต 1', 'สพป.สกลนคร เขต 2', 'สพป.สกลนคร เขต 3', 'สพม.สกลนคร', 
            'อาชีวศึกษา', 'สช. (เอกชน)', 'อปท. (ท้องถิ่น)', 'สกร. (ส่งเสริมการเรียนรู้)', 
            'พระปริยัติธรรม', 'ตชด.', 'การศึกษาพิเศษ', 'อุดมศึกษา', 'สถานรับเลี้ยงเด็ก/ศพด.'
          ];
          
          ags.forEach(ag => {
            let sch = Math.floor(Math.random() * 40) + 10;
            let std = sch * (Math.floor(Math.random() * 200) + 100);
            let tchr = Math.floor(std / 20);
            mockAgencyData.push({
              agency: ag, year: '2568', schools: sch, students: std, teachers: tchr,
              levels: { 'ก่อนประถม':std*0.2, 'ประถม':std*0.4, 'ม.ต้น':std*0.25, 'ม.ปลาย':std*0.15 },
              special: { 'บกพร่องทางร่างกาย':std*0.02, 'สติปัญญา':std*0.03, 'ออทิสติก':std*0.01 }
            });
          });

          let mockMapPoints = [
            {name: 'สำนักงาน สพป.สกลนคร เขต 1', agency: 'สพป.สกลนคร เขต 1', lat: 17.165, lng: 104.148, type: 'office'},
            {name: 'สำนักงาน สพม.สกลนคร', agency: 'สพม.สกลนคร', lat: 17.170, lng: 104.140, type: 'office'},
            {name: 'วิทยาลัยเทคนิคสกลนคร', agency: 'อาชีวศึกษา', lat: 17.180, lng: 104.130, type: 'office'}
          ];

          let filtered = mockAgencyData.filter(d => 
            (fYear === 'all' || d.year === fYear) && (fAgency === 'all' || d.agency === fAgency)
          );

          let sum = { sch: 0, std: 0, tch: 0, spc: 0 };
          let dAg = {}, dLvl = { 'ก่อนประถม':0, 'ประถม':0, 'ม.ต้น':0, 'ม.ปลาย':0 }, dSpc = { 'บกพร่องทางร่างกาย':0, 'สติปัญญา':0, 'ออทิสติก':0 };
          let dTch = {};

          filtered.forEach(d => {
            sum.sch += d.schools; sum.std += d.students; sum.tch += d.teachers;
            sum.spc += (d.special['ออทิสติก'] + d.special['บกพร่องทางร่างกาย'] + d.special['สติปัญญา']);
            dAg[d.agency] = d.schools; dTch[d.agency] = d.teachers;
            for(let k in dLvl) dLvl[k] += d.levels[k];
            for(let k in dSpc) dSpc[k] += d.special[k];
          });

          let filteredMapPoints = mockMapPoints;
          if(fAgency !== 'all') {
             filteredMapPoints = mockMapPoints.filter(p => p.agency === fAgency);
          }

          let finalData = {
            totalSchools: sum.sch, agencySummary: { labels: Object.keys(dAg), values: Object.values(dAg) },
            studentSummary: { labels: Object.keys(dLvl), values: Object.values(dLvl) },
            teacherSummary: { labels: Object.keys(dTch), values: Object.values(dTch) },
            specialSummary: { labels: Object.keys(dSpc), values: Object.values(dSpc) },
            mapPoints: filteredMapPoints, totalStudents: sum.std, totalTeachers: sum.tch, totalSpecial: sum.spc
          };

          processDashboardData(finalData);
        }, 800);
      }
    }

    function processDashboardData(data) {
      AppState.currentDashboardData = data; 
      
      const isAgency = data.isAgencyUser || AppState.userRole === 'agency';
      const execLayout = document.getElementById('executive-dashboard-layout');
      const agLayout = document.getElementById('agency-dashboard-layout');
      const simRatioLabel = document.getElementById('lblSimRatioLabel');

      if (isAgency) {
        if (execLayout) execLayout.style.display = 'none';
        if (agLayout) agLayout.style.display = 'block';
        if (simRatioLabel) simRatioLabel.innerText = 'สังกัด';

        // 1. เติมข้อมูลสถานะความคืบหน้าการส่งงานรายสังกัด (Compliance Tracker Cards)
        const compliance = data.compliance || { totalRequired: 0, totalApproved: 0, totalPending: 0, totalRejected: 0, formStatuses: [], recentSubmissions: [] };
        
        animateValue('agDashTotalRequired', 0, compliance.totalRequired, 800);
        animateValue('agDashApproved', 0, compliance.totalApproved, 800);
        animateValue('agDashPending', 0, compliance.totalPending, 800);
        animateValue('agDashRejected', 0, compliance.totalRejected, 800);

        // 2. เรนเดอร์ตารางสถานะแบบฟอร์มการส่งงานของปีปัจจุบัน (Form Status List)
        const agFormList = document.getElementById('agDashFormList');
        if (agFormList) {
          const formStatuses = compliance.formStatuses || [];
          if (formStatuses.length === 0) {
            agFormList.innerHTML = `<div style="text-align:center; padding:24px; color:var(--muted); font-size:12.5px;">ไม่มีแบบฟอร์มที่ต้องรายงานในปีนี้</div>`;
          } else {
            agFormList.innerHTML = formStatuses.map(f => {
              let badgeStyle = '';
              let badgeText = f.status || 'ยังไม่ส่ง';
              
              if (badgeText === 'อนุมัติแล้ว' || badgeText === 'เสร็จสิ้น') {
                badgeStyle = 'background:var(--green-ll); color:var(--green); border:1.5px solid var(--green-l);';
              } else if (badgeText === 'รออนุมัติ' || badgeText === 'รอการตรวจสอบ') {
                badgeStyle = 'background:var(--blue-ll); color:var(--blue); border:1.5px solid var(--blue-l);';
              } else if (badgeText === 'ส่งกลับแก้ไข' || badgeText === 'ต้องแก้ไข') {
                badgeStyle = 'background:var(--red-ll); color:var(--red); border:1.5px solid var(--red-l); font-weight: 700;';
              } else {
                badgeStyle = 'background:var(--s1); color:var(--muted); border:1.5px solid var(--border);';
              }
              
              const timeStr = f.timestamp ? `<span style="font-size:11px; color:var(--muted); margin-left:8px;">⏱️ ส่งเมื่อ: ${formatThaiDateTime(f.timestamp)}</span>` : '';
              const dlStr = f.deadline ? `<span style="font-size:11.5px; color:var(--red-d); font-weight:600; margin-left:auto;">📅 กำหนดส่ง: ${f.deadline}</span>` : '<span style="font-size:11px; color:var(--muted); margin-left:auto;">ไม่ระบุกำหนดส่ง</span>';
              
              return `
                <div style="display:flex; align-items:center; gap:12px; padding:12px 16px; background:var(--s1); border-radius:10px; border:1px solid var(--border-l); flex-wrap:wrap;">
                  <span class="material-icons-round" style="color:var(--blue); font-size:20px;">description</span>
                  <div style="flex:1; min-width:180px;">
                    <div style="font-size:13px; font-weight:700; color:var(--text);">${f.formName}</div>
                    <div style="margin-top:2px; display:flex; align-items:center; flex-wrap:wrap; gap:4px;">
                      <span class="badge" style="padding:2px 8px; font-size:11px; ${badgeStyle}">${badgeText}</span>
                      ${timeStr}
                    </div>
                  </div>
                  ${dlStr}
                </div>
              `;
            }).join('');
          }
        }

        // 3. เรนเดอร์รายการส่งงานล่าสุด 5 รายการ (Recent Submissions)
        const agRecentSubmissions = document.getElementById('agDashRecentSubmissions');
        if (agRecentSubmissions) {
          const recs = compliance.recentSubmissions || [];
          if (recs.length === 0) {
            agRecentSubmissions.innerHTML = `<div style="text-align:center; padding:24px; color:var(--muted); font-size:12.5px;">ยังไม่มีประวัติการส่งรายงาน</div>`;
          } else {
            agRecentSubmissions.innerHTML = recs.map(sub => {
              let badgeColor = '';
              if (sub.status === 'อนุมัติแล้ว') badgeColor = 'var(--green)';
              else if (sub.status === 'รออนุมัติ') badgeColor = 'var(--blue)';
              else if (sub.status === 'ส่งกลับแก้ไข') badgeColor = 'var(--red)';
              else badgeColor = 'var(--muted)';
              
              return `
                <div style="padding:10px 12px; background:var(--surface); border:1.5px solid var(--border-l); border-radius:8px; display:flex; flex-direction:column; gap:4px; font-size:12px;">
                  <div style="font-weight:700; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${sub.formName}</div>
                  <div style="display:flex; justify-content:space-between; align-items:center; font-size:11px; color:var(--muted);">
                    <span>🕒 ${formatThaiDateTime(sub.timestamp)}</span>
                    <span style="font-weight:700; color:${badgeColor};">${sub.status}</span>
                  </div>
                </div>
              `;
            }).join('');
          }
        }

        // โหลดกราฟสำหรับหน้าจอสังกัด
        renderAgencyCharts(data);
        return; // ออกจากการทำงานทันทีเมื่อเป็นสิทธิ์สังกัด
      }

      if (execLayout) execLayout.style.display = 'block';
        if (agLayout) agLayout.style.display = 'none';
        if (simRatioLabel) simRatioLabel.innerText = 'จังหวัด';

        const elSchools = document.getElementById('dashSchools');
        const elStudents = document.getElementById('dashStudents');
        const elTeachers = document.getElementById('dashTeachers');
        const elSpecial = document.getElementById('dashSpecial');

        let curSch = elSchools ? parseInt(elSchools.innerText.replace(/,/g, '')) || 0 : 0;
        let curStd = elStudents ? parseInt(elStudents.innerText.replace(/,/g, '')) || 0 : 0;
        let curTch = elTeachers ? parseInt(elTeachers.innerText.replace(/,/g, '')) || 0 : 0;
        let curSpc = elSpecial ? parseInt(elSpecial.innerText.replace(/,/g, '')) || 0 : 0;

        animateValue('dashSchools', curSch, data.totalSchools, 800);
        animateValue('dashStudents', curStd, Math.floor(data.totalStudents), 800);
        animateValue('dashTeachers', curTch, data.totalTeachers, 800);
        animateValue('dashSpecial', curSpc, Math.floor(data.totalSpecial), 800);

        // ── render custom dash cards ──────────────────────────────
        const customWrap = document.getElementById('custom-dash-cards');
        const customGrid = document.getElementById('custom-dash-cards-grid');
        const customs = data.customSummary || [];
        if (customGrid && customs.length > 0) {
          customGrid.innerHTML = customs.map(c => {
            const icon = c.name.indexOf('custom_b') === 0 ? 'apartment'
                       : c.name.indexOf('custom_u') === 0 ? 'payments'
                       : c.name.indexOf('custom_s') === 0 ? 'notes'
                       : 'bar_chart';
            return '<div style="background:var(--surface);border:1px solid var(--border-l);border-radius:12px;padding:16px;display:flex;align-items:center;gap:12px;">'
              + '<div style="width:40px;height:40px;border-radius:10px;background:var(--purple-ll,var(--blue-ll));display:flex;align-items:center;justify-content:center;flex-shrink:0;">'
                + '<span class="material-icons-round" style="color:var(--blue);font-size:20px;">' + icon + '</span>'
              + '</div>'
              + '<div style="flex:1;min-width:0;">'
                + '<div style="font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + c.label + '</div>'
                + '<div style="font-size:22px;font-weight:700;color:var(--text);line-height:1.2;">' + c.total.toLocaleString() + '</div>'
              + '</div>'
            + '</div>';
          }).join('');
          if (customWrap) customWrap.style.display = 'block';
        } else {
          if (customWrap) customWrap.style.display = 'none';
        }

        var filteredPoints = (data.mapPoints || []);
        var _fAgency = (document.getElementById('filterAgency') || {}).value || 'all';
        if (_fAgency !== 'all' && filteredPoints.length > 0) {
          filteredPoints = filteredPoints.filter(function(p){ return p.agencyId === _fAgency; });
        }

        const btnReset = document.getElementById('btn-reset-map-filter');
        if (btnReset) {
          btnReset.style.display = (_fAgency === 'all') ? 'none' : 'inline-flex';
        }

        const leaderboardList = document.getElementById('leaderboard-list');
        if (leaderboardList) {
          const lbData = data.leaderboard || [];
          if (lbData.length > 0) {
            leaderboardList.innerHTML = lbData.map((item, idx) => {
              const rank = idx + 1;
              let rankClass = '';
              if (rank === 1) rankClass = 'rank-1';
              else if (rank === 2) rankClass = 'rank-2';
              else if (rank === 3) rankClass = 'rank-3';

              return `
                <div class="leaderboard-item" onclick="window.filterDashboardFromMap('${item.agencyId}')" title="คลิกเพื่อกรองข้อมูลเฉพาะ ${item.agencyName}">
                  <div class="leaderboard-rank ${rankClass}">${rank}</div>
                  <div class="leaderboard-info">
                    <div class="leaderboard-name">${item.agencyName}</div>
                    <div class="leaderboard-pct-bar-wrap">
                      <div class="leaderboard-pct-bar" style="width: ${item.completionPct}%"></div>
                    </div>
                  </div>
                  <div class="leaderboard-val">${item.completionPct}%</div>
                </div>
              `;
            }).join('');
          } else {
            leaderboardList.innerHTML = `<div style="text-align:center; padding:32px; color:var(--muted); font-size:12px;">ไม่มีข้อมูลอันดับสำหรับตัวกรองนี้</div>`;
          }
        }

        updateMapMarkers(filteredPoints);
        initECharts();
        renderYoYChart();

      // ═══════════════════════════════════════════════════════════════
      // WORLD-CLASS CHART CONFIGURATIONS — Enterprise Analytics Level
      // ═══════════════════════════════════════════════════════════════

      const gFont = "'Google Sans','Sarabun',sans-serif";
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      const textColor  = isDark ? '#e3e3e3' : '#1f2937';
      const mutedColor = isDark ? '#9ca3af' : '#6b7280';
      const gridColor  = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
      const surfaceColor = isDark ? '#1e2028' : '#ffffff';

      // Premium 12-color palette (non-repeating)
      const PALETTE = [
        '#1a73e8','#34a853','#ea4335','#fbbc04','#9c27b0',
        '#00bcd4','#ff6d00','#e91e63','#009688','#3f51b5',
        '#795548','#607d8b'
      ];

      // ────────────────────────────────────────────────────────────────
      // CHART 1: สัดส่วนสถานศึกษา — Nightingale Rose + Center Label
      // ────────────────────────────────────────────────────────────────
      if (eChartAgency) {
        const agData = data.agencySummary.labels.map((lbl, i) => ({
          name: lbl,
          value: Number(data.agencySummary.values[i] || 0)
        })).filter(d => d.value > 0);
        const totalSchools = agData.reduce((s, d) => s + d.value, 0);

        if (totalSchools === 0) {
          eChartAgency.setOption({
            backgroundColor: 'transparent',
            legend: { show: false },
            series: [],
            graphic: [{
              type: 'text',
              left: 'center',
              top: 'middle',
              style: {
                text: 'ไม่มีข้อมูลสถานศึกษา',
                fontFamily: gFont,
                fontSize: 14,
                fill: mutedColor,
                textAlign: 'center'
              }
            }]
          }, true);
        } else {
          eChartAgency.setOption({
            backgroundColor: 'transparent',
            animation: true,
            animationType: 'scale',
            animationEasing: 'elasticOut',
            animationDuration: 1200,
            color: PALETTE,
            tooltip: {
              trigger: 'item',
              backgroundColor: isDark ? '#2d3035' : '#fff',
              borderColor: isDark ? '#444' : '#e5e7eb',
              borderWidth: 1,
              textStyle: { fontFamily: gFont, color: textColor, fontSize: 13 },
              formatter: function(p) {
                const pct = totalSchools > 0 ? (p.value / totalSchools * 100).toFixed(1) : 0;
                return `<div style="font-family:${gFont}">
                  <div style="font-weight:700;font-size:13px;margin-bottom:4px;">${p.name}</div>
                  <div style="display:flex;align-items:center;gap:8px;">
                    <span style="width:10px;height:10px;border-radius:50%;background:${p.color};display:inline-block;"></span>
                    <span>${p.value.toLocaleString()} แห่ง</span>
                    <span style="background:${p.color}22;color:${p.color};padding:1px 6px;border-radius:4px;font-weight:700;">${pct}%</span>
                  </div>
                </div>`;
              }
            },
            legend: {
              bottom: '2%', left: 'center', orient: 'horizontal',
              textStyle: { fontFamily: gFont, color: mutedColor, fontSize: 11 },
              icon: 'roundRect',
              itemWidth: 10, itemHeight: 10, itemGap: 12
            },
            graphic: [{
              type: 'group', left: 'center', top: 'middle',
              children: [
                { type: 'text', style: { text: totalSchools.toLocaleString(), fontSize: 28, fontWeight: 'bold', fill: textColor, fontFamily: gFont, textAlign: 'center' } },
                { type: 'text', top: 34, style: { text: 'สถานศึกษา', fontSize: 11, fill: mutedColor, fontFamily: gFont, textAlign: 'center' } }
              ]
            }],
            series: [{
              name: 'สถานศึกษา', type: 'pie',
              radius: ['42%', '70%'], center: ['50%', '46%'],
              roseType: agData.length > 2 ? 'area' : false,
              itemStyle: {
                borderRadius: 8,
                borderColor: isDark ? '#1a1a2e' : '#fff',
                borderWidth: 3
              },
              label: {
                show: agData.length <= 6,
                position: 'outside',
                fontFamily: gFont, fontSize: 11, color: textColor,
                formatter: '{b}\n{d}%'
              },
              labelLine: { show: agData.length <= 6, smooth: 0.5, length: 8, length2: 12 },
              emphasis: {
                itemStyle: { shadowBlur: 20, shadowColor: 'rgba(0,0,0,0.25)' },
                label: { fontSize: 13, fontWeight: 'bold' }
              },
              data: agData
            }]
          }, true);
        }
      }

      // ────────────────────────────────────────────────────────────────
      // CHART 2: ผู้เรียน — Gradient Bar + Trend Line + Avg Reference
      // ────────────────────────────────────────────────────────────────
      if (eChartStudent) {
        const sLabels = data.studentSummary.labels;
        const sValues = data.studentSummary.values.map(v => Number(v || 0));
        const sSum = sValues.reduce((a, b) => a + b, 0);
        const sAvg = sValues.length > 0 ? Math.round(sSum / sValues.length) : 0;
        const sMax = Math.max(...sValues, 1);

        if (sValues.length === 0 || sSum === 0) {
          eChartStudent.setOption({
            backgroundColor: 'transparent',
            xAxis: { show: false },
            yAxis: { show: false },
            series: [],
            graphic: [{
              type: 'text',
              left: 'center',
              top: 'middle',
              style: {
                text: 'ไม่มีข้อมูลสถิติผู้เรียน',
                fontFamily: gFont,
                fontSize: 14,
                fill: mutedColor,
                textAlign: 'center'
              }
            }]
          }, true);
        } else {
          const levelEmojis = { 'ก่อนประถม': '🧒', 'ประถม': '📚', 'ม.ต้น': '🏫', 'ม.ปลาย': '🎓', 'ปวช/ปวส': '🔧' };
          const levelColors = [
            ['#667eea','#764ba2'], ['#f093fb','#f5576c'],
            ['#4facfe','#00f2fe'], ['#43e97b','#38f9d7'], ['#fa709a','#fee140']
          ];

          eChartStudent.setOption({
            backgroundColor: 'transparent',
            animation: true, animationDuration: 1000, animationEasing: 'cubicOut',
            tooltip: {
              trigger: 'axis', axisPointer: { type: 'shadow' },
              backgroundColor: isDark ? '#2d3035' : '#fff',
              borderColor: isDark ? '#444' : '#e5e7eb', borderWidth: 1,
              textStyle: { fontFamily: gFont, color: textColor },
              formatter: function(params) {
                const p = params[0];
                const pct = sMax > 0 ? (p.value / sMax * 100).toFixed(1) : 0;
                const emoji = levelEmojis[p.name] || '📊';
                return `<div style="font-family:${gFont};min-width:140px">
                  <div style="font-weight:700;margin-bottom:6px;">${emoji} ${p.name}</div>
                  <div style="font-size:20px;font-weight:800;color:${PALETTE[p.dataIndex % PALETTE.length]};">${p.value.toLocaleString()} คน</div>
                  <div style="font-size:11px;color:${mutedColor};margin-top:2px;">คิดเป็น ${pct}% ของระดับสูงสุด</div>
                </div>`;
              }
            },
            grid: { left: '2%', right: '2%', bottom: '8%', top: '12%', containLabel: true },
            xAxis: {
              type: 'category',
              data: sLabels.map(l => (levelEmojis[l] || '') + ' ' + l),
              axisLabel: { fontFamily: gFont, color: mutedColor, fontSize: 11, interval: 0 },
              axisLine: { lineStyle: { color: gridColor } },
              axisTick: { show: false }
            },
            yAxis: {
              type: 'value',
              minInterval: 1,
              axisLabel: { fontFamily: gFont, color: mutedColor, fontSize: 10,
                formatter: v => v >= 1000 ? (v/1000).toFixed(0)+'K' : v },
              splitLine: { lineStyle: { type: 'dashed', color: gridColor } },
              axisLine: { show: false }
            },
            series: [
              {
                name: 'จำนวนผู้เรียน', type: 'bar', barWidth: '45%',
                itemStyle: {
                  borderRadius: [8, 8, 2, 2],
                  color: function(params) {
                    const colors = levelColors[params.dataIndex % levelColors.length];
                    return new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                      { offset: 0, color: colors[0] },
                      { offset: 1, color: colors[1] }
                    ]);
                  }
                },
                label: {
                  show: true, position: 'top',
                  fontFamily: gFont, fontSize: 11, fontWeight: 700,
                  color: textColor,
                  formatter: p => p.value > 0 ? p.value.toLocaleString() : ''
                },
                emphasis: { itemStyle: { shadowBlur: 20, shadowColor: 'rgba(0,0,0,0.2)' } },
                data: sValues
              },
              {
                name: 'ค่าเฉลี่ย', type: 'line',
                data: sLabels.map(() => sAvg),
                symbol: 'none', lineStyle: { color: '#ea4335', type: 'dashed', width: 1.5 },
                label: { show: false }, tooltip: { show: false }
              }
            ]
          }, true);
        }
      }

      // ────────────────────────────────────────────────────────────────
      // CHART 3: บุคลากร — Sorted Bar + Rank badge + Target line
      // ────────────────────────────────────────────────────────────────
      if (eChartTeacher) {
        let rawT = data.teacherSummary.labels.map((lbl, i) => ({
          name: lbl,
          value: Number(data.teacherSummary.values[i] || 0)
        })).sort((a, b) => b.value - a.value);

        const hasActiveTeachers = rawT.some(d => d.value > 0);
        if (hasActiveTeachers) {
          rawT = rawT.filter(d => d.value > 0);
        }

        const tLabels = rawT.map(d => d.name);
        const tValues = rawT.map(d => d.value);
        const tSum    = tValues.reduce((a, b) => a + b, 0);
        const tMax    = Math.max(...tValues, 1);
        const tAvg    = tValues.length > 0 ? Math.round(tSum / tValues.length) : 0;

        if (tValues.length === 0 || tSum === 0) {
          eChartTeacher.setOption({
            backgroundColor: 'transparent',
            xAxis: { show: false },
            yAxis: { show: false },
            series: [],
            graphic: [{
              type: 'text',
              left: 'center',
              top: 'middle',
              style: {
                text: 'ไม่มีข้อมูลครูและบุคลากร',
                fontFamily: gFont,
                fontSize: 14,
                fill: mutedColor,
                textAlign: 'center'
              }
            }]
          }, true);
        } else {
          eChartTeacher.setOption({
            backgroundColor: 'transparent',
            animation: true, animationDuration: 1000, animationEasing: 'cubicOut',
            tooltip: {
              trigger: 'axis', axisPointer: { type: 'shadow' },
              backgroundColor: isDark ? '#2d3035' : '#fff',
              borderColor: isDark ? '#444' : '#e5e7eb', borderWidth: 1,
              textStyle: { fontFamily: gFont, color: textColor },
              formatter: function(params) {
                const p = params[0];
                const rank = tValues.indexOf(p.value) + 1;
                return `<div style="font-family:${gFont};min-width:160px">
                  <div style="font-weight:700;margin-bottom:4px;">#${rank} ${p.name}</div>
                  <div style="font-size:18px;font-weight:800;color:#34a853;">${p.value.toLocaleString()} คน</div>
                  <div style="font-size:11px;color:${mutedColor};margin-top:2px;">${tAvg > 0 ? (p.value >= tAvg ? '⬆ สูงกว่าค่าเฉลี่ย' : '⬇ ต่ำกว่าค่าเฉลี่ย') : ''}</div>
                </div>`;
              }
            },
            grid: { left: '2%', right: '8%', bottom: '3%', top: '8%', containLabel: true },
            xAxis: {
              type: 'value',
              minInterval: 1,
              axisLabel: { fontFamily: gFont, color: mutedColor, fontSize: 10,
                formatter: v => v >= 1000 ? (v/1000).toFixed(0)+'K' : v },
              splitLine: { lineStyle: { type: 'dashed', color: gridColor } },
              axisLine: { show: false }
            },
            yAxis: {
              type: 'category', data: tLabels,
              axisLabel: {
                fontFamily: gFont, color: textColor, fontSize: 11,
                formatter: function(val, i) {
                  const medals = ['🥇','🥈','🥉'];
                  const prefix = i < 3 ? medals[i] : `${i+1}.`;
                  return `${prefix} ${val.length > 12 ? val.substring(0,12)+'…' : val}`;
                }
              },
              axisTick: { show: false },
              axisLine: { show: false }
            },
            series: [
              {
                name: 'บุคลากร', type: 'bar', barWidth: 14, barGap: '-100%',
                itemStyle: {
                  borderRadius: [0, 8, 8, 0],
                  color: function(params) {
                    const pct = tValues[params.dataIndex] / tMax;
                    if (pct > 0.75) return new echarts.graphic.LinearGradient(1,0,0,0,[{offset:0,color:'#f7971e'},{offset:1,color:'#ffd200'}]);
                    if (pct > 0.4)  return new echarts.graphic.LinearGradient(1,0,0,0,[{offset:0,color:'#1a73e8'},{offset:1,color:'#4facfe'}]);
                    return new echarts.graphic.LinearGradient(1,0,0,0,[{offset:0,color:'#6b7280'},{offset:1,color:'#9ca3af'}]);
                  }
                },
                label: {
                  show: true, position: 'right',
                  fontFamily: gFont, fontSize: 11, fontWeight: 700,
                  color: textColor, formatter: p => p.value > 0 ? p.value.toLocaleString() : ''
                },
                emphasis: { itemStyle: { shadowBlur: 16, shadowColor: 'rgba(0,0,0,0.2)' } },
                data: tValues,
                z: 2
              },
              {
                // Background track
                type: 'bar', barWidth: 14, barGap: '-100%',
                itemStyle: { color: isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.04)', borderRadius: [0,8,8,0] },
                data: tValues.map(() => tMax),
                label: { show: false }, tooltip: { show: false }, emphasis: { disabled: true },
                z: 1
              },
              {
                // Average reference line
                name: 'ค่าเฉลี่ย', type: 'line',
                data: tLabels.map(() => tAvg),
                symbol: 'none', lineStyle: { color: '#ea4335', type: 'dashed', width: 1.5 },
                tooltip: { show: false }, label: { show: false }
              }
            ]
          }, true);
        }
      }

      // ────────────────────────────────────────────────────────────────
      // CHART 4: การศึกษาพิเศษ — Polar Bar Chart (Radial Ring Progress)
      // ────────────────────────────────────────────────────────────────
      if (eChartSpecial) {
        const spLabels = data.specialSummary.labels;
        const spValues = data.specialSummary.values.map(v => Number(v || 0));
        const spTotal  = spValues.reduce((a, b) => a + b, 0);

        if (spValues.length === 0 || spTotal === 0) {
          eChartSpecial.setOption({
            backgroundColor: 'transparent',
            polar: { show: false },
            radiusAxis: { show: false },
            angleAxis: { show: false },
            series: [],
            graphic: [{
              type: 'text',
              left: 'center',
              top: 'middle',
              style: {
                text: 'ไม่มีข้อมูลนักเรียนพิเศษ',
                fontFamily: gFont,
                fontSize: 14,
                fill: mutedColor,
                textAlign: 'center'
              }
            }]
          }, true);
        } else {
          // Map data & sort so largest ring is on outer track
          const spData = spLabels.map((lbl, i) => ({
            name: lbl,
            value: spValues[i] || 0
          })).sort((a, b) => a.value - b.value);

          const sortedLabels = spData.map(d => d.name);
          const sortedValues = spData.map(d => d.value);

          const spColors = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#c77dff','#48cae4'];

          eChartSpecial.setOption({
            backgroundColor: 'transparent',
            color: spColors,
            polar: {
              radius: ['32%', '85%'],
              center: ['50%', '50%']
            },
            angleAxis: {
              max: Math.max(...sortedValues, 10) * 1.15, // Dynamic max to fill rings beautifully
              startAngle: 90,
              clockwise: true,
              axisLine: { show: false },
              axisTick: { show: false },
              axisLabel: { show: false },
              splitLine: { show: false }
            },
            radiusAxis: {
              type: 'category',
              data: sortedLabels,
              axisLine: { show: false },
              axisTick: { show: false },
              axisLabel: {
                show: true,
                textStyle: {
                  fontFamily: gFont,
                  color: textColor,
                  fontSize: 10,
                  fontWeight: 'bold'
                },
                interval: 0
              }
            },
            tooltip: {
              trigger: 'item',
              backgroundColor: isDark ? '#2d3035' : '#fff',
              borderColor: isDark ? '#444' : '#e5e7eb',
              borderWidth: 1,
              textStyle: { fontFamily: gFont, color: textColor },
              formatter: function(params) {
                return `<div style="font-family:${gFont}">
                  <div style="font-weight:700;margin-bottom:4px;">${params.name}</div>
                  <div style="font-size:16px;font-weight:800;color:${spColors[params.dataIndex % spColors.length]}">${params.value.toLocaleString()} คน</div>
                  <div style="font-size:11px;color:${mutedColor}">คิดเป็น ${spTotal > 0 ? (params.value / spTotal * 100).toFixed(1) : 0}% ของทั้งหมด</div>
                </div>`;
              }
            },
            series: [{
              type: 'bar',
              data: sortedValues,
              coordinateSystem: 'polar',
              barWidth: 8,
              roundCap: true,
              itemStyle: {
                shadowBlur: 4,
                shadowColor: 'rgba(0,0,0,0.15)'
              },
              showBackground: true,
              backgroundStyle: {
                color: isDark ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.03)'
              }
            }],
            graphic: [{
              type: 'group',
              left: 'center',
              top: 'center',
              children: [
                {
                  type: 'text',
                  style: {
                    text: spTotal.toLocaleString(),
                    fontFamily: gFont,
                    fontSize: 20,
                    fontWeight: 'bold',
                    fill: textColor,
                    textAlign: 'center'
                  }
                },
                {
                  type: 'text',
                  top: 24,
                  style: {
                    text: 'คน (ทั้งหมด)',
                    fontFamily: gFont,
                    fontSize: 9,
                    fill: mutedColor,
                    textAlign: 'center'
                  }
                }
              ]
            }]
          }, true);
        }
      }

      // ── Resize all after render ───────────────────────────────────
      setTimeout(function() {
        [eChartAgency, eChartStudent, eChartTeacher, eChartSpecial, eChartYoY].forEach(function(c) {
          if (c) c.resize();
        });
      }, 80);

      // ── Last Updated Timestamp ───────────────────────────────
      var nowStr = new Date().toLocaleString('th-TH', {
        year: 'numeric', month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
      var elLastUpd = document.getElementById('dashLastUpdated');
      if (elLastUpd) elLastUpd.innerText = nowStr;

      // ── Overall Progress Bar ─────────────────────────────────
      // คำนวณจาก agencySummary: นับสังกัดที่มีข้อมูล (values > 0)
      var agLabels = (data.agencySummary && data.agencySummary.labels) ? data.agencySummary.labels : [];
      var agValues = (data.agencySummary && data.agencySummary.values) ? data.agencySummary.values : [];
      var totalAg  = agLabels.length;
      var submittedAg = agValues.filter(function(v){ return v > 0; }).length;
      var overallPct = totalAg > 0 ? Math.round(submittedAg / totalAg * 100) : 0;

      var elSubCount = document.getElementById('dashSubmittedCount');
      var elTotalAg  = document.getElementById('dashTotalAgency');
      var elOvBar    = document.getElementById('dashOverallProgressBar');
      var elOvPct    = document.getElementById('dashOverallPct');
      if (elSubCount) elSubCount.innerText = submittedAg;
      if (elTotalAg)  elTotalAg.innerText  = totalAg || '—';
      if (elOvPct)    elOvPct.innerText     = overallPct + '%';
      // animate bar
      if (elOvBar) {
        elOvBar.style.width = '0%';
        setTimeout(function(){ elOvBar.style.width = overallPct + '%'; }, 100);
        elOvBar.style.background = overallPct >= 80
          ? 'linear-gradient(90deg,var(--green),#34a853)'
          : overallPct >= 50
            ? 'linear-gradient(90deg,var(--yellow),#fbbc04)'
            : 'linear-gradient(90deg,var(--red),#ea4335)';
        if (elOvPct) elOvPct.style.color = overallPct >= 80 ? 'var(--green)' : overallPct >= 50 ? 'var(--yellow)' : 'var(--red)';
      }

      // ── Per-Agency Progress Bars ──────────────────────────────
      var progressSection = document.getElementById('dashProgressSection');
      var progressList    = document.getElementById('dashProgressList');
      var progressUpdated = document.getElementById('dashProgressUpdated');

      if (progressList && agLabels.length > 0) {
        var maxVal = Math.max.apply(null, agValues.concat([1]));
        progressList.innerHTML = agLabels.map(function(lbl, i) {
          var val = agValues[i] || 0;
          var pct = Math.round(val / maxVal * 100);
          var hasData = val > 0;
          var barColor = hasData ? 'var(--blue)' : 'var(--border)';
          var statusIcon = hasData ? 'check_circle' : 'radio_button_unchecked';
          var statusColor = hasData ? 'var(--green)' : 'var(--hint)';
          return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
            <span class="material-icons-round" style="font-size:16px;color:${statusColor};flex-shrink:0;">${statusIcon}</span>
            <span style="font-size:12px;font-weight:500;color:var(--text-2);min-width:140px;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${lbl}">${lbl}</span>
            <div style="flex:1;height:7px;background:var(--s2);border-radius:4px;overflow:hidden;">
              <div style="height:100%;width:${pct}%;background:${barColor};border-radius:4px;transition:width .7s cubic-bezier(.4,0,.2,1);"></div>
            </div>
            <span style="font-size:11px;font-weight:700;color:${hasData ? 'var(--text)' : 'var(--hint)'};min-width:36px;text-align:right;">${val.toLocaleString()}</span>
            <span style="font-size:10px;color:var(--muted);min-width:28px;text-align:right;">${pct}%</span>
          </div>`;
        }).join('');
        if (progressSection) progressSection.style.display = 'block';
        if (progressUpdated) progressUpdated.innerText = 'อัปเดต ' + nowStr;
      } else {
        if (progressSection) progressSection.style.display = 'none';
      }
    }
